<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#84cc6d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="How Many?">
<title>How Many? — Little Learners</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfbea; --leaf:#84cc6d; --leaf-deep:#22c55e; --ink:#064e3b; --ink2:#065f46;
    --banner:#d9f99d; --amber:#fde68a; --amber-deep:#fbbf24; --green:#86efac;
    --ghost:#e6ffe6; --card:#ffffff; --slot:#f8fafc; --letter:#fff7ed; --letter-b:#fdba74;
    --shadow:0 14px 30px rgba(6,78,59,.14); --display:"Baloo 2", system-ui, sans-serif;
    --body:"Fredoka", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:var(--body); color:var(--ink);
    background:
      radial-gradient(1200px 480px at 12% -8%, #eaf7c6 0%, transparent 60%),
      radial-gradient(900px 520px at 110% 0%, #c9f0d8 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;
    overscroll-behavior:none; user-select:none;
    display:flex; flex-direction:column; min-height:100dvh;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  button{font-family:inherit; cursor:pointer; border:none;}

  /* HUD */
  #hud{display:flex; justify-content:space-between; align-items:center; padding:10px 14px 4px; gap:8px;}
  .badge{background:#dcfce7; color:var(--ink2); font-weight:700; padding:7px 13px; border-radius:999px;
         box-shadow:0 3px 0 rgba(6,78,59,.08); display:flex; align-items:center; gap:6px;}
  .badge b{color:var(--ink);}
  .badge.vip{flex-direction:column; align-items:flex-start; gap:3px;}
  .badge.vip .bar{display:block; width:64px; height:6px; background:#bbf7d0; border-radius:999px; overflow:hidden;}
  .badge.vip .bar span{display:block; height:6px; background:var(--leaf-deep); border-radius:999px; transition:width .4s ease;}

  /* Layout */
  #app{flex:1; display:flex; flex-direction:column; padding:8px 12px 12px;}
  .page{flex:1; display:flex; flex-direction:column; justify-content:space-between; gap:10px;}
  .card{background:var(--card); border-radius:26px; box-shadow:var(--shadow); padding:16px;}
  .game-card{flex:1; display:flex; flex-direction:column; min-height:0;}
  .footer{font-size:12px; color:#9aa6b0; text-align:center; margin:8px 0 2px; font-weight:600;}

  /* Home */
  .banner{background:linear-gradient(160deg,#e6fbb8,var(--banner)); flex:1; display:flex; flex-direction:column;}
  .title-xl{font-family:var(--display); font-weight:800; font-size:clamp(30px,8vw,46px); margin:2px 0 0; color:var(--ink); letter-spacing:-.5px;}
  .sub{margin:2px 0 0; font-weight:600; color:var(--ink2);}
  .features{margin-top:14px; display:flex; flex-direction:column; gap:12px;}
  .feature-card{background:#fff; border:2px solid #dcfce7; border-radius:22px; padding:14px 16px; display:flex; flex-direction:column; align-items:flex-start;
                box-shadow:0 6px 0 #e6f6df; transition:transform .12s ease;}
  .feature-card:active{transform:translateY(2px);}
  .fc-emoji{font-size:38px; line-height:1;}
  .feature-card h3{font-family:var(--display); margin:6px 0 2px; font-size:21px;}
  .feature-card p{margin:0 0 10px; color:var(--ink2); font-weight:500;}
  .util-row{margin-top:auto; padding-top:14px; display:flex; flex-wrap:wrap; gap:8px;}

  /* Buttons */
  .btn{border-radius:18px; padding:12px 16px; font-weight:700; font-size:16px; color:var(--ink);
       box-shadow:0 5px 0 rgba(6,78,59,.13); transition:transform .1s ease, box-shadow .1s ease;}
  .btn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(6,78,59,.13);}
  .btn-amber{background:var(--amber);}
  .btn-green{background:var(--green);}
  .btn-ghost{background:var(--ghost); color:var(--ink2);}
  .util-row .btn{flex:1 1 46%;}

  /* Count game */
  .question{font-family:var(--display); font-size:clamp(20px,5.5vw,26px); font-weight:700; text-align:center; margin:2px 0 8px; color:#1f2937;}
  .animals-box{flex:1.1; min-height:120px; background:#f0fdf4; border:2px dashed #bbf7d0; border-radius:22px; padding:12px;
               display:flex; flex-wrap:wrap; align-content:center; justify-content:center; gap:10px;}
  .animal{font-size:clamp(30px,9vw,52px); line-height:1; animation:pop .25s ease both;}
  @keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
  .answers-grid{flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:12px; align-content:center;}
  .answer-btn{background:#bbf7d0; border:2px solid #a7f3d0; border-radius:16px; font-weight:800; color:var(--ink);
              font-size:clamp(20px,6vw,26px); padding:14px 0; box-shadow:0 5px 0 #86d6a4; transition:transform .1s;}
  .answer-btn:active{transform:translateY(3px); box-shadow:0 2px 0 #86d6a4;}
  .shake{animation:shake .28s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

  /* Toolbars */
  .toolbar{display:flex; justify-content:space-between; gap:10px; margin-top:12px;}
  .toolbar .btn{flex:1; text-align:center;}
  .row{display:flex; gap:10px; align-items:center;}
  .row-between{display:flex; justify-content:space-between; align-items:center;}
  .row-spread{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:12px;}
  .row-spread .btn{flex:1;}

  /* Word builder */
  .wb{justify-content:flex-start;}
  .clue{flex:1; display:flex; align-items:center; justify-content:center; min-height:120px;}
  .clue-btn{background:none; font-size:clamp(80px,30vw,150px); line-height:1; padding:0; transition:transform .12s;}
  .clue-btn:active{transform:scale(.92);}
  .wb-slots{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:10px 0;}
  .wb-slot{min-width:56px; height:56px; border:2px dashed #cbd5e1; border-radius:14px; background:var(--slot);
           font-size:26px; font-weight:800; color:#111827; display:flex; align-items:center; justify-content:center;}
  .wb-slot.next{border-color:var(--leaf-deep); border-style:solid; background:#f0fdf4;}
  .wb-slot.filled{border-style:solid; border-color:#bbf7d0; background:#fff;}
  .wb-bank{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:8px;}
  .wb-letter{min-width:56px; min-height:56px; background:var(--letter); border:2px solid var(--letter-b); border-radius:16px;
             font-size:24px; font-weight:800; color:#111827; box-shadow:0 5px 0 #f4c486; transition:transform .1s;}
  .wb-letter:active{transform:translateY(3px); box-shadow:0 2px 0 #f4c486;}
  .wb-toolbar{flex-direction:column; gap:10px;}
  .wb-toolbar .row{justify-content:space-between;}
  .wb-toolbar .modes{justify-content:center; flex-wrap:wrap;}
  .chip{padding:8px 14px; border-radius:14px; font-weight:800; color:var(--ink2); background:var(--ghost); border:1px solid #bbf7d0;}
  .chip.active{background:var(--green); border:2px solid var(--leaf-deep); color:var(--ink);}

  /* Memory match */
  .mm-top{margin-bottom:8px; gap:8px;}
  .tabs{display:flex; background:var(--ghost); border-radius:14px; padding:3px;}
  .tab{padding:7px 14px; border-radius:11px; font-weight:800; color:var(--ink2); background:transparent;}
  .tab.active{background:var(--green); color:var(--ink); box-shadow:0 2px 0 #6ed293;}
  .mm-grid-wrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0;}
  .mm-grid{display:grid; grid-template-columns:repeat(var(--cols,4),1fr); gap:10px; width:100%; max-width:440px;}
  .mm-card{aspect-ratio:1; border-radius:14px; background:#e2e8f0; font-size:clamp(22px,8vw,40px);
           display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #c3ccd6; transition:transform .12s, background .2s;}
  .mm-card.face{background:#fff;}
  .mm-card.matched{background:#ecfdf5; border:2px solid var(--leaf-deep); box-shadow:none;}
  .mm-card:active:not(:disabled){transform:scale(.94);}
  .mm-toolbar{flex-wrap:wrap; justify-content:center; gap:8px;}
  .mm-btn{flex:0 1 auto; min-width:78px; padding:10px 16px; background:#d1fae5; border:1px solid #10b981; font-size:14px;}

  /* Sticker book */
  .title{font-family:var(--display); font-weight:800; font-size:clamp(20px,6vw,28px); margin:0 0 2px;}
  .subtitle{color:var(--ink2); margin:0 0 8px; font-weight:600;}
  .prog{height:12px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-bottom:10px;}
  .prog span{display:block; height:12px; background:var(--leaf-deep); border-radius:999px; transition:width .4s;}
  .sticker-grid{flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(6,1fr); gap:8px; padding:4px; align-content:start;}
  .sticker{aspect-ratio:1; background:#f1f5f9; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:clamp(20px,6vw,30px);}
  .sticker.empty{opacity:.32;}

  /* Settings */
  .set-list{flex:1; display:flex; flex-direction:column; gap:12px; overflow-y:auto; padding:4px 2px;}
  .set-row{display:flex; justify-content:space-between; align-items:center; gap:12px; font-weight:700; font-size:17px;}
  .switch{min-width:64px; padding:8px 0; border-radius:999px; font-weight:800; background:#e5e7eb; color:#64748b;}
  .switch.on{background:var(--green); color:var(--ink);}
  .slider{flex:1; max-width:55%; accent-color:var(--leaf-deep);}
  .set-stats{background:#f0fdf4; border:2px solid #dcfce7; border-radius:16px; padding:12px; font-weight:600; line-height:1.6; color:var(--ink2);}

  /* Modal */
  .modal-back{position:fixed; inset:0; background:rgba(6,78,59,.35); display:flex; align-items:center; justify-content:center; z-index:50;}
  .modal{background:#fff; padding:20px; border-radius:20px; min-width:200px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:6px;}
  .modal-opt{padding:12px; border-radius:12px; background:#f0fdf4; font-weight:800; color:var(--ink2); font-size:16px;}
  .modal-opt.sel{background:var(--green); color:var(--ink);}
  .modal-close{padding:10px; font-weight:800; color:#334155; background:transparent;}

  /* Overlay layer: confetti, toasts, star fly */
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}
  #overlay{position:fixed; inset:0; pointer-events:none; z-index:70;}
  .toast, .ribbon{position:absolute; left:50%; transform:translate(-50%,12px); opacity:0; transition:all .25s ease;
                  padding:10px 22px; border-radius:999px; color:#fff; font-weight:800; box-shadow:var(--shadow); white-space:nowrap;}
  .toast{bottom:24px; background:#10b981;}
  .ribbon{top:74px; background:var(--leaf-deep);}
  .toast.show, .ribbon.show{opacity:1; transform:translate(-50%,0);}
  .star-fly{position:absolute; font-size:24px; transition:all .65s cubic-bezier(.2,.7,.3,1); opacity:1;}
  .star-fly.go{transform:translate(40px,-30px) scale(1.4); opacity:0;}

  #installBtn{position:fixed; right:14px; bottom:16px; z-index:80; background:var(--leaf-deep); color:#fff;
              border-radius:999px; padding:10px 18px; font-weight:800; box-shadow:var(--shadow);}

  @media (min-width:560px){ #app{max-width:540px; margin:0 auto; width:100%;} #hud{max-width:540px; margin:0 auto; width:100%;} }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
  <div id="hud"></div>
  <main id="app"></main>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <div id="overlay" aria-live="polite"></div>
  <button id="installBtn" hidden>⬇️ Install</button>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="cloud.js"></script>
  <script src="app.js"></script>
</body>
</html>

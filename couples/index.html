<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2b0f20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Couples S&L">
<title>Couples Snakes &amp; Ladders</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2b0f20; --bg2:#3a1530; --panel:#451a37; --panel2:#552243;
    --ink:#fdeef4; --muted:#d4a8bd; --line:rgba(253,238,244,.12);
    --rose:#ff8fb1; --rose-deep:#f25287; --plum:#b07ddb; --gold:#ffd27d; --mint:#8de0b9;
    --p1:#ff8fb1; --p2:#b07ddb;
    --board:#fdf6f9; --tile-line:#e7cdd9; --num:#7a4a61;
    --display:"Lora", Georgia, serif; --body:"Nunito Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0; font-family:var(--body); color:var(--ink); min-height:100dvh; display:flex; flex-direction:column;
       background:radial-gradient(900px 480px at 80% -10%, rgba(255,143,177,.14), transparent 55%),
                  radial-gradient(700px 520px at -10% 50%, rgba(176,125,219,.12), transparent 55%), var(--bg);
       padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); user-select:none;}
  button,input{font-family:inherit;} button{cursor:pointer; border:none;}
  .wrap{flex:1; width:100%; max-width:980px; margin:0 auto; padding:14px 14px 18px; display:flex; flex-direction:column; gap:12px;}

  header{display:flex; justify-content:space-between; align-items:center;}
  h1{font-family:var(--display); font-style:italic; font-weight:700; font-size:clamp(20px,5vw,28px); margin:0; letter-spacing:.2px;}
  h1 .amp{color:var(--rose);}
  .icon-btns{display:flex; gap:8px;}
  .icon-btn{width:40px; height:40px; border-radius:13px; background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:17px; display:grid; place-items:center;}

  .layout{flex:1; display:flex; flex-direction:column; gap:12px; min-height:0;}
  @media(min-width:860px){ .layout{flex-direction:row; align-items:flex-start;} .board-pane{flex:1.4;} .side-pane{flex:1; position:sticky; top:14px;} }

  /* Board */
  .board-card{background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:12px;}
  .board-outer{position:relative; width:100%; max-width:560px; margin:0 auto;}
  .board{position:relative; width:100%; aspect-ratio:1; background:var(--board); border-radius:14px; overflow:hidden;
         display:grid; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(10,1fr); border:2px solid #4a2238;}
  .tile{position:relative; border:0.5px solid var(--tile-line);}
  .tile .num{position:absolute; top:2px; left:3px; font-size:clamp(7px,1.6vw,10px); font-weight:800; color:var(--num); line-height:1;}
  .tile .love{position:absolute; bottom:1px; right:2px; font-size:clamp(9px,2.2vw,13px); line-height:1;}
  .tile.t100{background:linear-gradient(135deg,#ffe3ee,#f3e3ff);}
  svg.art{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
  .pawn{position:absolute; width:8.5%; aspect-ratio:1; border-radius:50%; display:grid; place-items:center;
        font-size:clamp(12px,3vw,18px); transition:left .12s linear, top .12s linear; z-index:5;
        border:2.5px solid; background:#fff; box-shadow:0 3px 8px rgba(43,15,32,.35); overflow:hidden;}
  .pawn img{width:100%; height:100%; object-fit:cover;}
  .pawn.p1{border-color:var(--p1);} .pawn.p2{border-color:var(--p2);}
  .pawn.active{box-shadow:0 0 0 3px rgba(255,210,125,.65), 0 3px 8px rgba(43,15,32,.4);}

  /* Side: status + dice */
  .side-pane{display:flex; flex-direction:column; gap:12px;}
  .status-card{background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:18px;}
  .turn-line{font-family:var(--display); font-style:italic; font-size:19px; margin:0 0 4px;}
  .event-line{color:var(--muted); font-size:14px; min-height:20px; margin:0;}
  .players-row{display:flex; gap:10px; margin-top:14px;}
  .pchip{flex:1; display:flex; align-items:center; gap:9px; background:var(--panel2); border-radius:14px; padding:9px 11px; border:1.5px solid transparent;}
  .pchip.active{border-color:var(--gold);}
  .pchip .dotface{width:32px; height:32px; border-radius:50%; border:2.5px solid; display:grid; place-items:center; font-size:16px; background:#fff; flex:none; overflow:hidden;}
  .pchip .dotface img{width:100%;height:100%;object-fit:cover;}
  .pchip.one .dotface{border-color:var(--p1);} .pchip.two .dotface{border-color:var(--p2);}
  .pchip b{display:block; font-size:14px; line-height:1.2;}
  .pchip small{color:var(--muted); font-size:11.5px;}

  .dice-card{background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:18px; text-align:center;}
  .die{width:84px; height:84px; margin:0 auto 12px; background:#fff; border-radius:18px; display:grid; place-items:center;
       box-shadow:0 8px 22px rgba(43,15,32,.45), inset 0 -4px 0 rgba(43,15,32,.08); transition:transform .15s;}
  .die.spin{animation:wob .12s linear infinite;}
  @keyframes wob{0%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}100%{transform:rotate(-7deg)}}
  .pips{width:58px; height:58px; display:grid; grid-template:repeat(3,1fr)/repeat(3,1fr); gap:3px;}
  .pip{border-radius:50%; background:#2b0f20; opacity:0; align-self:center; justify-self:center; width:13px; height:13px;}
  .pip.on{opacity:1;}
  .roll-btn{width:100%; padding:15px; border-radius:16px; background:linear-gradient(135deg,var(--rose-deep),var(--plum)); color:#fff;
            font-weight:800; font-size:17px; letter-spacing:.4px; box-shadow:0 6px 0 rgba(43,15,32,.4); transition:transform .1s, box-shadow .1s, opacity .2s;}
  .roll-btn:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(43,15,32,.4);}
  .roll-btn:disabled{opacity:.5;}
  .reset-link{margin-top:10px; background:none; color:var(--muted); font-weight:700; font-size:13.5px; text-decoration:underline;}

  /* Modals */
  .modal-back{position:fixed; inset:0; background:rgba(20,6,15,.78); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:18px;}
  .modal{background:var(--panel); border:1px solid var(--line); border-radius:24px; padding:24px; width:100%; max-width:430px; max-height:92dvh; overflow-y:auto;}
  .modal h2{font-family:var(--display); font-style:italic; margin:0 0 6px; font-size:24px;}
  .modal .hint{color:var(--muted); font-size:14px; margin:0 0 14px;}
  label{display:block; font-weight:700; font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin:14px 0 6px;}
  input[type=text]{width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:16px; outline:none;}
  input[type=text]:focus{border-color:var(--rose);}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{flex:1; min-width:72px; padding:10px 8px; border-radius:12px; background:var(--panel2); color:var(--muted); font-weight:700; font-size:13.5px; border:1.5px solid transparent;}
  .seg button.sel{background:rgba(255,143,177,.16); color:var(--ink); border-color:var(--rose);}
  .avatar-row{display:flex; align-items:center; gap:10px;}
  .avatar-prev{width:46px; height:46px; border-radius:50%; border:2.5px solid var(--rose); background:#fff; display:grid; place-items:center; font-size:22px; overflow:hidden; flex:none;}
  .avatar-prev img{width:100%;height:100%;object-fit:cover;}
  .mini-btn{padding:9px 13px; border-radius:11px; background:var(--panel2); color:var(--ink); border:1px solid var(--line); font-weight:700; font-size:13px;}
  .primary-btn{width:100%; margin-top:20px; padding:14px; border-radius:14px; background:linear-gradient(135deg,var(--rose-deep),var(--plum)); color:#fff; font-weight:800; font-size:16px;}
  .quest-card{text-align:center;}
  .quest-card .qicon{font-size:44px;}
  .quest-card p.q{font-family:var(--display); font-style:italic; font-size:19px; line-height:1.5; margin:10px 0;}
  .quest-card small{color:var(--muted);}
  .win-title{font-size:42px; margin:0;}
  .switch-row{display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-weight:700; font-size:15px;}
  .toggle{min-width:58px; padding:8px 0; border-radius:999px; background:var(--panel2); color:var(--muted); font-weight:800; border:1px solid var(--line);}
  .toggle.on{background:rgba(141,224,185,.16); color:var(--mint); border-color:var(--mint);}
  .footer{font-size:11.5px; color:#9a6b82; text-align:center;}
  .footer a{color:inherit; text-decoration:underline; text-underline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Couples Snakes <span class="amp">&amp;</span> Ladders</h1>
    <div class="icon-btns">
      <button class="icon-btn" id="musicBtn" title="Music">🎵</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </header>

  <div class="layout">
    <div class="board-pane">
      <div class="board-card"><div class="board-outer">
        <div class="board" id="board"></div>
      </div></div>
    </div>

    <div class="side-pane">
      <div class="status-card">
        <p class="turn-line" id="turnHint">Loading…</p>
        <p class="event-line" id="lastEvent"></p>
        <div class="players-row" id="playersRow"></div>
      </div>
      <div class="dice-card">
        <div class="die" id="die"><div class="pips" id="pips"></div></div>
        <button class="roll-btn" id="rollBtn">SPIN 🎲</button>
        <button class="reset-link" id="resetBtn">Reset game</button>
      </div>
      <p class="footer">An Ogbara Labs experiment · always tasteful &amp; consensual 💕<br><a href="https://ogbaralabs.xyz/privacy" target="_blank" rel="noopener">Privacy</a> · <a href="https://ogbaralabs.xyz/terms" target="_blank" rel="noopener">Terms</a></p>
    </div>
  </div>
</div>
<div id="overlay"></div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="cloud.js"></script>
<script>
"use strict";
/* ===== Couples Snakes & Ladders — PWA port =====
   Original Expo features kept: 2 players w/ names+gender+avatar, Easy/Hard start rule,
   love quests (Romantic/Fun/Spicy), SVG snakes & ladders, extra turn on 6, exact-100 rule,
   final "ultimate prompt" on win. Music synthesised (no mp3 needed). */

const COLS = 10;
const LADDERS = { 6:26, 44:64, 18:43, 28:48, 73:95 };
const SNAKES  = { 24:3, 41:21, 53:31, 68:47, 72:50, 83:62, 91:71, 96:75, 99:80 };
const TRANSITIONS = { ...LADDERS, ...SNAKES };

const LOVE_QUESTS = {
  Romantic: {
    7:"Give a specific, heartfelt compliment about a quality you love in your partner.",
    25:"Share a favorite memory you have of a moment you spent together.",
    45:"Look into each other's eyes for at least 30 seconds without talking.",
    58:"Hold hands and share what you first noticed or admired about each other.",
    65:"Name three things you are grateful for about your relationship.",
    73:"Tell your partner one thing they do that always makes you feel loved.",
    85:"Slow dance with your partner for 30 seconds to a song you both like.",
    93:"Describe how your life has changed for the better since meeting your partner.",
  },
  Fun: {
    7:"Do your silliest dance for 10 seconds.",
    25:"Tell a goofy joke that's so bad, it's good.",
    45:"Do your best celebrity impression. Your partner has to guess who it is.",
    58:"Swap seats or spots with your partner in the funniest way possible.",
    65:"Make up a two-line song about the game and sing it.",
    73:"Pretend you're both in a movie scene and act it out dramatically.",
    85:"Invent a secret handshake with your partner and perform it now.",
    93:"Pick an everyday object nearby and come up with the weirdest use for it.",
  },
  Spicy: {
    7:"Give a flirty compliment on your partner.",
    25:"Give your partner a two-minute neck or shoulder massage.",
    45:"Describe a PG-13 fantasy you'd like to try someday.",
    58:"Whisper the sexiest thing you can think of into your partner's ear.",
    65:"Remove one small piece of clothing, with your partner's consent.",
    73:"Let your partner choose a spot for you to lightly tease with your fingers.",
    85:"Give a kiss on a non-obvious body part (e.g., neck, shoulder, or arm).",
    93:"Share a daring place you'd like to kiss or be kissed by your partner.",
  },
};

/* ---------- Persistence (mirrors snl_* keys) ---------- */
const get = (k,d)=>{ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch{ return d; } };
const set = (k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch{} };

const S = {
  p1: { name:get("snl_p1_name",""), gender:get("snl_p1_gender","female"), color:"var(--p1)", position:0 },
  p2: { name:get("snl_p2_name",""), gender:get("snl_p2_gender","male"),   color:"var(--p2)", position:0 },
  ultimatePrompt: get("snl_final_prompt",""),
  musicEnabled: get("snl_music_enabled","true")==="true",
  loveMode: LOVE_QUESTS[get("snl_love_mode","Romantic")] ? get("snl_love_mode","Romantic") : "Romantic",
  difficulty: get("snl_difficulty","Easy")==="Hard" ? "Hard" : "Easy",
  current: 1, winner:null, spinning:false, animating:false, setupOpen:false,
};
function savePrefs(){
  set("snl_p1_name",S.p1.name); set("snl_p2_name",S.p2.name);
  set("snl_p1_gender",S.p1.gender); set("snl_p2_gender",S.p2.gender);
  set("snl_final_prompt",S.ultimatePrompt); set("snl_music_enabled",S.musicEnabled);
  set("snl_love_mode",S.loveMode); set("snl_difficulty",S.difficulty);
  if (window.Cloud) Cloud.schedulePush();
}

/* ---------- Avatar store (IndexedDB) ---------- */
const AvatarDB = (()=>{ let dbp=null;
  const open=()=>dbp||(dbp=new Promise((res,rej)=>{ const r=indexedDB.open("snl-avatars",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("a"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }));
  return {
    put:async(id,b)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").put(b,id); t.oncomplete=res; }); },
    get:async(id)=>{ const db=await open(); return new Promise((res)=>{ const r=db.transaction("a").objectStore("a").get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); },
    del:async(id)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").delete(id); t.oncomplete=res; }); },
  };
})();
const avatarURL = { 1:null, 2:null };
async function loadAvatars(){
  for (const i of [1,2]) {
    let b = await AvatarDB.get("p"+i);
    if (!b && window.Cloud && Cloud.isSignedIn()) { b = await Cloud.getPhoto("avatar-p"+i); if (b) await AvatarDB.put("p"+i, b); }
    if (b) avatarURL[i] = URL.createObjectURL(b);
  }
}

/* ---------- Audio: synthesised romantic loop + SFX ---------- */
const Music = (()=>{ let ctx=null, nodes=null;
  const ensure=()=>{ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch{} } if(ctx&&ctx.state==="suspended")ctx.resume(); return ctx; };
  function tone(f,t0,d,type,g){ const c=ensure(); if(!c)return; const o=c.createOscillator(),gn=c.createGain();
    o.type=type; o.frequency.value=f; gn.gain.setValueAtTime(0.0001,t0); gn.gain.linearRampToValueAtTime(g,t0+0.05); gn.gain.linearRampToValueAtTime(0.0001,t0+d);
    o.connect(gn).connect(nodes?nodes.master:c.destination); o.start(t0); o.stop(t0+d+0.05); }
  return {
    unlock:ensure,
    start(){ const c=ensure(); if(!c||nodes)return;
      const master=c.createGain(); master.gain.value=S.musicEnabled?0.07:0.0001; master.connect(c.destination);
      nodes={master,id:null};
      // slow romantic waltz arpeggio: Am – F – C – G
      const chords=[[220,261.63,329.63],[174.61,220,261.63],[130.81,164.81,196],[196,246.94,293.66]];
      let bar=0;
      const tick=()=>{ if(!nodes)return; const t=c.currentTime, ch=chords[bar%4];
        ch.forEach((f,i)=>tone(f,t+i*0.42,1.15,"sine",1)); tone(ch[0]/2,t,1.4,"triangle",0.7); bar++; };
      nodes.id=setInterval(tick,1400); tick(); },
    setOn(on){ if(!nodes){ if(on)this.start(); return; } const c=ensure(); nodes.master.gain.setTargetAtTime(on?0.07:0.0001,c.currentTime,0.15); },
    sfxClimb(){ const c=ensure(); if(!c)return; const t=c.currentTime; [392,523,659,784].forEach((f,i)=>tone(f,t+i*0.07,0.18,"triangle",0.16)); },
    sfxSlide(){ const c=ensure(); if(!c)return; const t=c.currentTime; const o=c.createOscillator(),g=c.createGain();
      o.type="sawtooth"; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(120,t+0.5);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.55); },
    sfxStep(){ const c=ensure(); if(!c)return; tone(740,c.currentTime,0.05,"sine",0.1); },
    sfxWin(){ const c=ensure(); if(!c)return; const t=c.currentTime; [523,659,784,1046,1318].forEach((f,i)=>tone(f,t+i*0.09,0.25,"triangle",0.18)); },
    sfxLove(){ const c=ensure(); if(!c)return; const t=c.currentTime; [659,830,988].forEach((f,i)=>tone(f,t+i*0.1,0.3,"sine",0.14)); },
  };
})();

/* ---------- Board geometry ---------- */
const numAt = (rowTop,col) => { const rb=9-rowTop, even=rb%2===0; return even? rb*10+col+1 : rb*10+(9-col)+1; };
function cellCenter(n){ // % coords of tile centre
  const z=n-1, rb=Math.floor(z/10), rowTop=9-rb, pos=z%10, col=(rb%2===0)?pos:9-pos;
  return { x:(col+0.5)*10, y:(rowTop+0.5)*10 };
}

const el=(t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const delay=(ms)=>new Promise(r=>setTimeout(r,ms));

/* ---------- Build board DOM + SVG art ---------- */
const boardEl = document.getElementById("board");
function buildBoard(){
  boardEl.innerHTML="";
  const quests = LOVE_QUESTS[S.loveMode];
  for (let r=0;r<10;r++) for (let c=0;c<10;c++){
    const n = numAt(r,c);
    const t = el("div","tile"+(n===100?" t100":""));
    t.innerHTML = `<span class="num">${n}</span>${quests[n]?'<span class="love">💕</span>':''}`;
    boardEl.appendChild(t);
  }
  // SVG snakes & ladders
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 100 100"); svg.setAttribute("preserveAspectRatio","none"); svg.classList.add("art");
  let art="";
  for (const [f,to] of Object.entries(LADDERS)){
    const a=cellCenter(+f), b=cellCenter(to);
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), ux=dx/len, uy=dy/len, px=-uy, py=ux, w=1.7;
    const rail=(s)=>`M${a.x+px*s} ${a.y+py*s} L${b.x+px*s} ${b.y+py*s}`;
    art+=`<path d="${rail(w)}" stroke="#b07a4a" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${rail(-w)}" stroke="#b07a4a" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;
    const rungs=Math.max(3,Math.floor(len/5));
    for(let i=1;i<rungs;i++){ const t=i/rungs, cx=a.x+dx*t, cy=a.y+dy*t;
      art+=`<line x1="${cx+px*w}" y1="${cy+py*w}" x2="${cx-px*w}" y2="${cy-py*w}" stroke="#c98f5c" stroke-width="0.85" stroke-linecap="round"/>`; }
  }
  for (const [f,to] of Object.entries(SNAKES)){
    const a=cellCenter(+f), b=cellCenter(to);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), px=-dy/len, py=dx/len, amp=Math.min(8,len*0.22);
    const c1x=a.x+dx*0.25+px*amp, c1y=a.y+dy*0.25+py*amp, c2x=a.x+dx*0.75-px*amp, c2y=a.y+dy*0.75-py*amp;
    art+=`<path d="M${a.x} ${a.y} C${c1x} ${c1y} ${mx} ${my} ${mx} ${my} S${c2x} ${c2y} ${b.x} ${b.y}" stroke="#e0517a" stroke-width="1.9" fill="none" stroke-linecap="round" opacity="0.85"/>`;
    art+=`<circle cx="${a.x}" cy="${a.y}" r="1.9" fill="#c2275a"/>`;
    art+=`<circle cx="${a.x-0.55}" cy="${a.y-0.5}" r="0.4" fill="#fff"/><circle cx="${a.x+0.55}" cy="${a.y-0.5}" r="0.4" fill="#fff"/>`;
  }
  svg.innerHTML = art;
  boardEl.appendChild(svg);
  // pawns
  for (const i of [1,2]){
    const p = el("div",`pawn p${i}`); p.id="pawn"+i;
    boardEl.appendChild(p);
  }
  paintPawns();
}
function pawnFace(i){
  const pl = i===1?S.p1:S.p2;
  if (avatarURL[i]) return `<img src="${avatarURL[i]}" alt="">`;
  return pl.gender==="female"?"👩":"👨";
}
function paintPawns(){
  for (const i of [1,2]){
    const pl=i===1?S.p1:S.p2, p=document.getElementById("pawn"+i);
    p.innerHTML = pawnFace(i);
    p.classList.toggle("active", S.current===i && !S.winner);
    const n = Math.max(1, pl.position||1);
    const {x,y}=cellCenter(n);
    const off = (S.p1.position===S.p2.position) ? (i===1?-2.2:2.2) : 0;
    p.style.left = `calc(${x+off}% - 4.25%)`;
    p.style.top  = `calc(${y}% - 4.25%)`;
    p.style.opacity = pl.position===0 ? 0.45 : 1;
  }
}

/* ---------- Status UI ---------- */
const turnHint=document.getElementById("turnHint"), lastEvent=document.getElementById("lastEvent"), playersRow=document.getElementById("playersRow");
function startRule(){ return S.difficulty==="Hard" ? "spin a 6 to start!" : "spin anything to start!"; }
function name(i){ return (i===1?S.p1.name:S.p2.name) || ("Player "+i); }
function paintStatus(){
  playersRow.innerHTML="";
  for (const i of [1,2]){
    const pl=i===1?S.p1:S.p2;
    const chip = el("div",`pchip ${i===1?"one":"two"}${S.current===i&&!S.winner?" active":""}`);
    chip.innerHTML = `<span class="dotface">${pawnFace(i)}</span><span><b>${name(i)}</b><small>tile ${pl.position}</small></span>`;
    playersRow.appendChild(chip);
  }
}
function setHint(t){ turnHint.textContent=t; }
function setEvent(t){ lastEvent.textContent=t; }

/* ---------- Dice ---------- */
const pipsEl=document.getElementById("pips"), dieEl=document.getElementById("die");
const PIP_MAP={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
for(let i=0;i<9;i++) pipsEl.appendChild(el("span","pip"));
function showDie(v){ [...pipsEl.children].forEach((p,i)=>p.classList.toggle("on", PIP_MAP[v].includes(i))); }
showDie(1);

/* ---------- Game flow (faithful to original) ---------- */
async function hopTo(i, from, to, stepMs){
  S.animating=true;
  const step = to>from?1:-1;
  for (let pos=from+step; step>0?pos<=to:pos>=to; pos+=step){
    (i===1?S.p1:S.p2).position=pos; Music.sfxStep(); paintPawns(); paintStatus();
    await delay(stepMs);
  }
  S.animating=false;
}
async function resolveTransition(i, at){
  const to=TRANSITIONS[at];
  if (to==null) return {finalPos:at, jumped:false};
  const dir = to>at?"ladder":"snake";
  setEvent(lastEvent.textContent+` (${dir} to ${to})`);
  dir==="ladder"?Music.sfxClimb():Music.sfxSlide();
  await hopTo(i, at, to, 80);
  return {finalPos:to, jumped:true};
}
function finishTurn(keep, actor){
  if (keep) setHint(`${actor} gets another turn ✨`);
  else { S.current = S.current===1?2:1; setHint(`Your turn, ${name(S.current)}`); }
  paintPawns(); paintStatus();
}
function showWin(actor){
  S.winner=S.current; Music.sfxWin(); setHint(`${actor} wins! 🎉`);
  const back=el("div","modal-back"), box=el("div","modal quest-card");
  box.innerHTML=`<p class="win-title">🎉</p><h2>Congratulations, ${actor}!</h2>
    <p class="q">${S.ultimatePrompt ? S.ultimatePrompt : "You have won the game!"}</p>
    ${S.ultimatePrompt?'<small>The ultimate prompt — winner\'s privilege 💞</small>':""}`;
  const again=el("button","primary-btn","Play again"); again.onclick=()=>{ back.remove(); resetGame(); };
  box.appendChild(again); back.appendChild(box); document.getElementById("overlay").appendChild(back);
}
function showQuest(text){
  Music.sfxLove();
  const back=el("div","modal-back"), box=el("div","modal quest-card");
  box.innerHTML=`<p class="qicon">💕</p><h2>Love Quest!</h2><p class="q">${text}</p><small>Always tasteful and consensual.</small>`;
  const ok=el("button","primary-btn","We did it 💖"); ok.onclick=()=>back.remove();
  box.appendChild(ok); back.appendChild(box);
  back.onclick=(e)=>{ if(e.target===back) back.remove(); };
  document.getElementById("overlay").appendChild(back);
}

async function spin(){
  if (S.winner||S.spinning||S.animating||S.setupOpen) return;
  Music.unlock(); if (S.musicEnabled) Music.start();
  const actor=name(S.current), mover=S.current;
  const curPos=(mover===1?S.p1:S.p2).position;
  setEvent(""); setHint("Spinning…"); S.spinning=true;
  dieEl.classList.add("spin");
  let tmp=1; const iv=setInterval(()=>{ showDie(tmp); tmp=tmp%6+1; },70);
  await delay(900+Math.floor(Math.random()*400));
  clearInterval(iv); dieEl.classList.remove("spin");
  const roll=Math.floor(Math.random()*6)+1;
  showDie(roll); S.spinning=false;

  if (curPos===0){
    if (S.difficulty==="Hard" && roll!==6){
      setEvent(`${actor} spun ${roll} but needs a 6 to start`);
      finishTurn(false,actor); return;
    }
    setEvent(`${actor} spun ${roll} → 0 → 1`);
    await hopTo(mover,0,1,120);
    const {finalPos,jumped}=await resolveTransition(mover,1);
    if (finalPos>=100){ showWin(actor); return; }
    finishTurn(roll===6&&!jumped,actor); return;
  }
  if (curPos+roll>100){
    setEvent(`${actor} spun ${roll} but cannot overshoot 100`);
    finishTurn(false,actor); return;
  }
  const target=curPos+roll;
  setEvent(`${actor} spun ${roll} → ${curPos} → ${target}`);
  await hopTo(mover,curPos,target,100);
  const {finalPos,jumped}=await resolveTransition(mover,target);
  const quests=LOVE_QUESTS[S.loveMode];
  if (quests[finalPos]){
    setEvent(lastEvent.textContent+` • Love Quest!`);
    showQuest(quests[finalPos]);
  }
  if (finalPos>=100){ showWin(actor); return; }
  finishTurn(roll===6&&!jumped,actor);
}
function resetGame(){
  S.p1.position=0; S.p2.position=0; S.current=1; S.winner=null; S.spinning=false; S.animating=false;
  setEvent(""); showDie(1); setHint(`${name(1)}, ${startRule()}`); paintPawns(); paintStatus();
}

/* ---------- Setup / Settings modal ---------- */
function openSetup(firstRun=false){
  S.setupOpen=true;
  const back=el("div","modal-back"), box=el("div","modal");
  box.innerHTML=`<h2>${firstRun?"Welcome, lovebirds":"Settings"} 💞</h2>
    <p class="hint">${firstRun?"Set your names to start playing.":"Names, quests and game rules."}</p>`;
  const fields=el("div");
  const mkName=(i)=>{ const pl=i===1?S.p1:S.p2;
    fields.append(el("label",null,`Player ${i} name`));
    const inp=el("input"); inp.type="text"; inp.value=pl.name; inp.placeholder=i===1?"e.g. Amara":"e.g. Dayo";
    inp.oninput=()=>pl.name=inp.value; fields.append(inp);
    const row=el("div","avatar-row"); row.style.marginTop="8px";
    const prev=el("span","avatar-prev",pawnFace(i));
    const seg=el("div","seg"); seg.style.flex="1";
    ["female","male"].forEach(g=>{ const b=el("button",pl.gender===g?"sel":"", g==="female"?"👩 Female":"👨 Male");
      b.onclick=()=>{ pl.gender=g; [...seg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); if(!avatarURL[i]) prev.innerHTML=pawnFace(i); }; seg.append(b); });
    const up=el("button","mini-btn","📷"); up.title="Set photo";
    const file=el("input"); file.type="file"; file.accept="image/*"; file.hidden=true;
    up.onclick=()=>file.click();
    file.onchange=async()=>{ const f=file.files[0]; if(!f)return;
      const blob=await downscale(f,300,0.82); await AvatarDB.put("p"+i,blob);
      if (window.Cloud) Cloud.uploadPhoto("avatar-p"+i, blob);
      if (avatarURL[i]) URL.revokeObjectURL(avatarURL[i]);
      avatarURL[i]=URL.createObjectURL(blob); prev.innerHTML=pawnFace(i); };
    const clr=el("button","mini-btn","✕"); clr.title="Remove photo";
    clr.onclick=async()=>{ await AvatarDB.del("p"+i); if (window.Cloud) Cloud.deletePhoto("avatar-p"+i); if(avatarURL[i])URL.revokeObjectURL(avatarURL[i]); avatarURL[i]=null; prev.innerHTML=pawnFace(i); };
    row.append(prev,seg,up,clr,file); fields.append(row);
  };
  mkName(1); mkName(2);

  fields.append(el("label",null,"Love quest mode"));
  const modeSeg=el("div","seg");
  Object.keys(LOVE_QUESTS).forEach(m=>{ const b=el("button",S.loveMode===m?"sel":"", m==="Romantic"?"💗 Romantic":m==="Fun"?"😜 Fun":"🔥 Spicy");
    b.onclick=()=>{ S.loveMode=m; [...modeSeg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; modeSeg.append(b); });
  fields.append(modeSeg);

  fields.append(el("label",null,"Difficulty"));
  const diffSeg=el("div","seg");
  ["Easy","Hard"].forEach(d=>{ const b=el("button",S.difficulty===d?"sel":"", d==="Easy"?"Easy · start on any spin":"Hard · need a 6 to start");
    b.onclick=()=>{ S.difficulty=d; [...diffSeg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; diffSeg.append(b); });
  fields.append(diffSeg);

  fields.append(el("label",null,"Ultimate prompt (revealed to the winner)"));
  const fp=el("input"); fp.type="text"; fp.value=S.ultimatePrompt; fp.placeholder="Winner picks date night…";
  fp.oninput=()=>S.ultimatePrompt=fp.value; fields.append(fp);

  const musicRow=el("div","switch-row"); musicRow.append(el("span",null,"🎵 Background music"));
  const tog=el("button","toggle"+(S.musicEnabled?" on":""), S.musicEnabled?"On":"Off");
  tog.onclick=()=>{ S.musicEnabled=!S.musicEnabled; tog.classList.toggle("on",S.musicEnabled); tog.textContent=S.musicEnabled?"On":"Off"; Music.setOn(S.musicEnabled); };
  musicRow.append(tog); fields.append(musicRow);

  box.appendChild(fields);
  const start=el("button","primary-btn", firstRun?"Start the game 💘":"Save");
  start.onclick=()=>{
    if (!S.p1.name.trim()||!S.p2.name.trim()){ alert("Please enter both players' names."); return; }
    S.p1.name=S.p1.name.trim(); S.p2.name=S.p2.name.trim();
    savePrefs(); S.setupOpen=false; back.remove();
    buildBoard(); setHint(`${name(S.current)}, ${startRule()}`); paintStatus(); paintPawns();
  };
  box.appendChild(start);
  back.appendChild(box); document.getElementById("overlay").appendChild(back);
}
function downscale(fileBlob,maxSide,q){ return new Promise((res)=>{ const img=new Image();
  img.onload=()=>{ const r=Math.min(1,maxSide/Math.max(img.width,img.height));
    const cv=document.createElement("canvas"); cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>res(b||fileBlob),"image/jpeg",q); URL.revokeObjectURL(img.src); };
  img.onerror=()=>res(fileBlob); img.src=URL.createObjectURL(fileBlob); }); }

/* ---------- Wire up ---------- */
document.getElementById("rollBtn").onclick=spin;
document.getElementById("resetBtn").onclick=()=>{ if(confirm("Reset positions and start over?")) resetGame(); };
document.getElementById("settingsBtn").onclick=()=>openSetup(false);
const musicBtn=document.getElementById("musicBtn");
const paintMusicBtn=()=>musicBtn.style.opacity=S.musicEnabled?1:0.45;
musicBtn.onclick=()=>{ S.musicEnabled=!S.musicEnabled; set("snl_music_enabled",S.musicEnabled); Music.unlock(); Music.setOn(S.musicEnabled); if(S.musicEnabled)Music.start(); paintMusicBtn(); };
paintMusicBtn();
addEventListener("pointerdown",function once(){ Music.unlock(); if(S.musicEnabled)Music.start(); removeEventListener("pointerdown",once); });

(async ()=>{
  await loadAvatars();
  buildBoard();
  const haveNames=!!(S.p1.name&&S.p2.name);
  if (!haveNames){ setHint("Enter your names to start!"); openSetup(true); }
  else setHint(`${name(1)}, ${startRule()}`);
  paintStatus();

  /* ---------------- Cloud sync (optional account) ---------------- */
  if (window.Cloud) Cloud.init("couples", {
    collect: () => ({
      p1:{ name:S.p1.name, gender:S.p1.gender }, p2:{ name:S.p2.name, gender:S.p2.gender },
      ultimatePrompt:S.ultimatePrompt, musicEnabled:S.musicEnabled, loveMode:S.loveMode, difficulty:S.difficulty,
    }),
    apply: async (st) => {
      if (st.p1){ S.p1.name=st.p1.name||S.p1.name; S.p1.gender=st.p1.gender||S.p1.gender; }
      if (st.p2){ S.p2.name=st.p2.name||S.p2.name; S.p2.gender=st.p2.gender||S.p2.gender; }
      if (st.ultimatePrompt!==undefined) S.ultimatePrompt=st.ultimatePrompt;
      if (st.musicEnabled!==undefined){ S.musicEnabled=!!st.musicEnabled; Music.setOn(S.musicEnabled); paintMusicBtn(); }
      if (st.loveMode && LOVE_QUESTS[st.loveMode]) S.loveMode=st.loveMode;
      if (st.difficulty==="Easy"||st.difficulty==="Hard") S.difficulty=st.difficulty;
      set("snl_p1_name",S.p1.name); set("snl_p2_name",S.p2.name);
      set("snl_p1_gender",S.p1.gender); set("snl_p2_gender",S.p2.gender);
      set("snl_final_prompt",S.ultimatePrompt); set("snl_music_enabled",S.musicEnabled);
      set("snl_love_mode",S.loveMode); set("snl_difficulty",S.difficulty);
      await loadAvatars();
      buildBoard(); paintStatus();
      if (!S.winner && !S.spinning && !S.animating) setHint(`${name(S.current)}, ${startRule()}`);
    },
  });
})();
if ("serviceWorker" in navigator) addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1e0a16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Couples S&L">
<title>Couples Snakes &amp; Ladders</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c0913; --bg2:#2b0f20;
    --ink:#fdeef4; --muted:#caa0b6; --faint:#9a7088;
    --line:rgba(255,222,237,.10); --line2:rgba(255,222,237,.16);
    --rose:#ff8fb1; --rose-deep:#f25287; --rose-hot:#ff5d96; --plum:#b07ddb; --plum-deep:#8a52c8;
    --gold:#ffd27d; --mint:#8de0b9;
    --p1:#ff5d8f; --p2:#9b6be0;
    --board:#fdf2f7; --tile-alt:#f6dceb; --num:#9a5f7c;
    --wood:#bd8550; --wood-dk:#a06d3c; --wood-rung:#d59c64;
    --snake:#e85d86; --snake-dk:#cf3f6e;
    --panel:rgba(64,24,50,.55); --panel-edge:rgba(255,160,200,.16);
    --display:"Lora", Georgia, serif; --body:"Nunito Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{margin:0; font-family:var(--body); color:var(--ink); min-height:100dvh; user-select:none;
       background:
         radial-gradient(120% 70% at 50% -8%, rgba(242,82,135,.20), transparent 55%),
         radial-gradient(90% 60% at 110% 30%, rgba(176,125,219,.16), transparent 55%),
         radial-gradient(90% 60% at -10% 60%, rgba(255,143,177,.12), transparent 55%),
         linear-gradient(180deg, var(--bg2), var(--bg) 60%, #160710);
       padding-top:env(safe-area-inset-top);
       padding-bottom:calc(150px + env(safe-area-inset-bottom));}
  button,input{font-family:inherit;} button{cursor:pointer; border:none; color:inherit; background:none;}
  .wrap{width:100%; max-width:560px; margin:0 auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:14px;}

  /* ---------- Header ---------- */
  header{display:grid; grid-template-columns:48px 1fr auto; align-items:center; gap:8px; padding:2px 2px 0;}
  .round-btn{width:48px; height:48px; border-radius:16px; display:grid; place-items:center;
    background:linear-gradient(160deg, rgba(90,38,70,.9), rgba(58,22,46,.85));
    border:1px solid var(--panel-edge); box-shadow:0 6px 18px rgba(15,4,12,.5), inset 0 1px 0 rgba(255,200,222,.12);
    color:var(--rose);}
  .round-btn:active{transform:scale(.94);}
  .icon-btns{display:flex; gap:9px; justify-self:end;}
  .icon-btns .round-btn{font-size:19px;}
  .burger{display:flex; flex-direction:column; gap:4px;}
  .burger i{display:block; width:18px; height:2.4px; border-radius:2px; background:var(--rose);}
  .title{text-align:center; line-height:1; padding:0 2px;}
  .title .l1{font-family:var(--display); font-style:italic; font-weight:700; color:#fff;
    font-size:clamp(22px,6.6vw,30px); display:block; letter-spacing:.3px;
    text-shadow:0 2px 14px rgba(242,82,135,.35);}
  .title .l2{font-family:var(--display); font-style:italic; font-weight:700;
    font-size:clamp(20px,6vw,27px); display:block; margin-top:-2px;
    background:linear-gradient(90deg,var(--rose),var(--rose-deep)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .title .sub{display:block; margin-top:5px; color:var(--muted); font-size:clamp(10px,2.9vw,13px); font-weight:600; white-space:nowrap;}
  .title .l1::before, .title .l1::after{content:"❥"; color:var(--rose-deep); font-size:.5em; vertical-align:.45em; opacity:.7; margin:0 .22em;}

  /* ---------- Board (hero) ---------- */
  .board-outer{position:relative; width:100%;}
  .board{position:relative; width:100%; aspect-ratio:1; background:
      linear-gradient(180deg,#fff7fb,var(--board)); border-radius:22px; overflow:hidden;
      display:grid; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(10,1fr);
      box-shadow:0 22px 50px rgba(15,4,12,.6), 0 0 0 1px rgba(255,160,200,.18), inset 0 0 0 6px rgba(255,255,255,.55);}
  .tile{position:relative;}
  .tile.alt{background:var(--tile-alt);}
  .tile.qt{background:radial-gradient(circle at 50% 56%, rgba(255,93,143,.30), rgba(255,143,177,.10) 68%, transparent 78%);}
  .tile .num{position:absolute; top:3px; left:4px; font-size:clamp(7px,1.7vw,11px); font-weight:800; color:var(--num); line-height:1;}
  .tile .love{position:absolute; inset:0; display:grid; place-items:center; font-size:clamp(13px,3.4vw,22px); line-height:1;
    filter:drop-shadow(0 0 6px rgba(255,93,143,.7)) drop-shadow(0 2px 2px rgba(170,30,80,.4));}
  .tile.t100{background:linear-gradient(135deg,#ffd9e9,#f3d4ff);}
  .tile.t100::after{content:"💖"; position:absolute; inset:0; display:grid; place-items:center; font-size:clamp(14px,3.6vw,24px);
    filter:drop-shadow(0 0 7px rgba(255,93,143,.7));}
  .tile.t100 .num{color:#9a3a66;}
  svg.art{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; filter:drop-shadow(0 1px 1.5px rgba(120,50,40,.3));}
  .snake-head{position:absolute; width:3.8%; height:3.8%; font-size:clamp(11px,3.1vw,20px); line-height:1;
    display:grid; place-items:center; pointer-events:none; z-index:4;
    filter:drop-shadow(0 1px 2px rgba(150,20,70,.45));}

  /* Pawns rendered as map-pins — face/photo lives in the bulb */
  .pawn{position:absolute; width:9%; height:12.5%; transition:left .12s linear, top .12s linear; z-index:6;}
  .pawn .pin{position:absolute; left:0; right:0; top:0; bottom:18%; border-radius:50%;
    background:#fff; border:2.5px solid; display:grid; place-items:center;
    filter:drop-shadow(0 4px 4px rgba(20,6,15,.4));}
  .pawn .tip{position:absolute; left:50%; bottom:6%; transform:translateX(-50%); width:0; height:0; z-index:-1;
    border-left:6px solid transparent; border-right:6px solid transparent; border-top:13px solid #fff;}
  .pawn.p1 .pin{border-color:var(--p1);} .pawn.p2 .pin{border-color:var(--p2);}
  .pawn.p1 .tip{border-top-color:var(--p1);} .pawn.p2 .tip{border-top-color:var(--p2);}
  .pin-face{display:grid; place-items:center; width:82%; height:82%; border-radius:50%; overflow:hidden;
    font-size:clamp(11px,2.9vw,18px); line-height:1;}
  .pin-face img{width:100%; height:100%; object-fit:cover;}
  .pawn.active .pin{box-shadow:0 0 0 3px rgba(255,210,125,.7), 0 4px 9px rgba(20,6,15,.45);}
  .pawn.hop{animation:hopArc .14s ease-out;}
  @keyframes hopArc{0%{margin-top:0}45%{margin-top:-3%}100%{margin-top:0}}
  .pawn.climb .pin{box-shadow:0 0 0 4px rgba(255,210,125,.85), 0 0 18px rgba(255,210,125,.8);}
  .pawn.climb{animation:climbPulse .35s ease-in-out infinite;}
  @keyframes climbPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .pawn.slide{animation:slideShake .18s linear infinite; filter:saturate(1.5) hue-rotate(-12deg);}
  @keyframes slideShake{0%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}100%{transform:rotate(-6deg)}}

  /* ---------- Status pills ---------- */
  .pills{display:flex; gap:9px; align-items:stretch;}
  .spill{flex:1; min-width:0; display:flex; align-items:center; justify-content:center; gap:7px; text-align:center;
    padding:11px 10px; border-radius:16px; background:var(--panel); border:1px solid var(--panel-edge);
    box-shadow:inset 0 1px 0 rgba(255,200,222,.08), 0 6px 16px rgba(15,4,12,.35);
    font-size:13px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .spill .ic{color:var(--rose); font-size:14px; flex:none;}
  .spill#upPill{color:#ffdfeb;}
  .spill#upPill .ic{color:var(--gold);}

  /* ---------- Quest card (the heart moment) ---------- */
  .quest-card{position:relative; border-radius:22px; padding:18px 18px 16px;
    background:
      radial-gradient(120% 120% at 12% 30%, rgba(255,93,143,.22), transparent 55%),
      linear-gradient(160deg, rgba(74,26,58,.85), rgba(48,18,40,.9));
    border:1px solid var(--panel-edge); box-shadow:0 14px 34px rgba(15,4,12,.45), inset 0 1px 0 rgba(255,200,222,.1);
    overflow:hidden;}
  .quest-card.flash{animation:cardFlash .6s ease-out;}
  @keyframes cardFlash{0%{box-shadow:0 0 0 0 rgba(255,93,143,.55), 0 14px 34px rgba(15,4,12,.45);}
    100%{box-shadow:0 0 0 14px rgba(255,93,143,0), 0 14px 34px rgba(15,4,12,.45);}}
  .qc-head{text-align:center; font-size:12px; font-weight:900; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--rose); margin-bottom:14px;}
  .qc-body{display:flex; align-items:center; gap:16px;}
  .qc-heart{flex:none; width:74px; height:74px; display:grid; place-items:center; position:relative; font-size:54px;
    filter:drop-shadow(0 0 14px rgba(255,93,143,.85)) drop-shadow(0 3px 4px rgba(150,20,70,.5));}
  .qc-heart::before,.qc-heart::after{content:"✦"; position:absolute; color:#fff; opacity:.85; font-size:13px;
    animation:twinkle 2.2s ease-in-out infinite;}
  .qc-heart::before{top:2px; left:-2px;} .qc-heart::after{bottom:6px; right:-2px; font-size:10px; animation-delay:.8s;}
  @keyframes twinkle{0%,100%{opacity:.25; transform:scale(.7)}50%{opacity:.95; transform:scale(1.1)}}
  .qc-main{flex:1; min-width:0;}
  .qc-who{display:inline-block; margin:0 0 6px; padding:3px 11px; border-radius:999px; font-size:11.5px; font-weight:800;
    background:rgba(255,143,177,.16); border:1px solid rgba(255,143,177,.45); color:var(--rose);}
  .qc-text{font-family:var(--display); font-style:italic; font-weight:600; font-size:clamp(16px,4.4vw,19px);
    line-height:1.4; margin:0; color:#fff;}
  .qc-note{color:var(--muted); font-size:12.5px; margin:7px 0 0;}
  .qc-actions{display:flex; gap:10px; align-items:center; margin-top:14px; justify-content:flex-end;}
  .qc-pass{padding:11px 16px; border-radius:999px; background:rgba(255,255,255,.07); border:1px solid var(--line2);
    color:var(--muted); font-weight:800; font-size:13.5px;}
  .qc-done{display:flex; align-items:center; gap:9px; padding:7px 7px 7px 18px; border-radius:999px;
    background:rgba(255,255,255,.06); border:1px solid var(--panel-edge); color:#fff; font-weight:800; font-size:15px;}
  .qc-done .chk{width:34px; height:34px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:15px;
    background:linear-gradient(135deg,var(--rose-hot),var(--rose-deep)); box-shadow:0 3px 10px rgba(242,82,135,.5);}
  .qc-done:active{transform:scale(.97);}
  .qc-close{padding:11px 18px; border-radius:999px; background:rgba(255,255,255,.07); border:1px solid var(--line2);
    color:var(--muted); font-weight:800; font-size:13.5px;}
  .quest-back{position:fixed; inset:0; z-index:55; display:none; align-items:center; justify-content:center; padding:18px;
    background:rgba(12,4,12,.62); backdrop-filter:blur(4px);}
  .quest-back.show{display:flex;}
  .quest-back .quest-card{width:100%; max-width:440px; margin:0; animation:questPop .26s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes questPop{from{opacity:0; transform:translateY(10px) scale(.96);} to{opacity:1; transform:none;}}

  /* ---------- Two columns: log + players ---------- */
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:440px){ .two-col{grid-template-columns:1fr;} }
  .panel{border-radius:18px; padding:14px; background:var(--panel); border:1px solid var(--panel-edge);
    box-shadow:0 10px 26px rgba(15,4,12,.4), inset 0 1px 0 rgba(255,200,222,.07);}
  .panel .ptitle{text-align:center; font-size:11.5px; font-weight:900; letter-spacing:1.6px; text-transform:uppercase;
    color:var(--rose); margin:0 0 12px;}
  .log-list{display:flex; flex-direction:column; gap:11px;}
  .lastmove{display:flex; align-items:center; justify-content:center; gap:8px; min-height:20px;
    margin:2px auto 0; max-width:520px; padding:0 10px; color:var(--muted); font-size:13px; line-height:1.3;
    text-align:center; opacity:.92;}
  .lastmove:empty{display:none;}
  .lastmove .lm-ic{font-size:15px; flex:none;}
  .lastmove .lm-tx{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lastmove .lm-tx b{color:var(--text); font-weight:700;}
  .lastmove em{font-style:normal; color:var(--rose); font-weight:800;}
  .log-empty{color:var(--faint); font-size:13px; text-align:center; padding:8px 0;}
  .log-item{display:flex; align-items:flex-start; gap:10px;}
  .log-ic{flex:none; width:30px; height:30px; border-radius:10px; display:grid; place-items:center; font-size:15px;
    background:rgba(255,255,255,.05); border:1px solid var(--line);}
  .log-item.turn .log-ic{font-size:12px; color:var(--plum);}
  .log-tx{flex:1; min-width:0; font-size:13px; line-height:1.25;}
  .log-tx b{font-weight:700; color:var(--ink);}
  .log-tx b em{font-style:normal; color:var(--rose);}
  .log-tx i{display:block; font-style:normal; color:var(--muted); font-size:12px; margin-top:1px;}
  .log-ago{flex:none; color:var(--faint); font-size:11px; white-space:nowrap; padding-top:2px;}

  .players-card{display:flex; flex-direction:column; gap:0; justify-content:center;}
  .prow{display:flex; align-items:center; gap:11px; padding:6px 2px;}
  .prow + .prow{border-top:1px solid var(--line); padding-top:14px; margin-top:8px;}
  .pavatar{flex:none; width:46px; height:46px; border-radius:50%; display:grid; place-items:center; font-size:23px;
    background:#fff; overflow:hidden; border:3px solid;}
  .pavatar.one{border-color:var(--p1);} .pavatar.two{border-color:var(--p2);}
  .prow.active .pavatar{box-shadow:0 0 0 3px rgba(255,210,125,.55), 0 0 14px rgba(255,210,125,.4);}
  .pavatar img{width:100%; height:100%; object-fit:cover;}
  .pinfo{flex:1; min-width:0;}
  .pinfo b{display:block; font-size:18px; font-weight:800; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .turn-badge{display:inline-block; margin-top:4px; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:800;
    background:linear-gradient(135deg,var(--rose),var(--rose-deep)); color:#fff;}
  .psquare{flex:none; text-align:right;}
  .psquare small{display:block; color:var(--muted); font-size:11.5px; font-weight:700;}
  .psquare .snum{display:flex; align-items:center; gap:5px; justify-content:flex-end; font-size:22px; font-weight:900; line-height:1.1; margin-top:2px;}
  .pinmark{width:22px; height:22px; border-radius:50%; display:grid; place-items:center; font-size:12px; color:#fff;}
  .pinmark.one{background:var(--p1);} .pinmark.two{background:var(--p2);}

  .footer{font-size:11.5px; color:var(--faint); text-align:center; margin:2px 0 4px;}
  .footer a{color:inherit; text-decoration:underline; text-underline-offset:2px;}

  /* ---------- Bottom dock ---------- */
  .dock{position:fixed; left:0; right:0; bottom:0; z-index:40;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, transparent, rgba(20,7,16,.7) 30%, rgba(20,7,16,.94));}
  .dock-inner{max-width:560px; margin:0 auto; display:grid; grid-template-columns:1fr auto 1fr; align-items:end; gap:10px;}
  .dock-side{display:flex; align-items:center; gap:8px; justify-content:center; height:62px; padding:0 10px; border-radius:20px;
    background:linear-gradient(160deg, rgba(82,34,64,.85), rgba(52,20,42,.9)); border:1px solid var(--panel-edge);
    box-shadow:0 10px 24px rgba(15,4,12,.5), inset 0 1px 0 rgba(255,200,222,.1);
    color:#fff; font-weight:800; font-size:clamp(13px,4vw,16px); white-space:nowrap; min-width:0;}
  .dock-side .dic{width:34px; height:34px; border-radius:11px; display:grid; place-items:center; font-size:17px; flex:none;
    background:rgba(255,143,177,.16); border:1px solid rgba(255,143,177,.3);}
  .dock-side:active{transform:scale(.97);}
  /* Player cards flanking the die (the die sits between the two players) */
  .dock-player{display:flex; align-items:center; gap:9px; height:62px; padding:0 12px; border-radius:20px;
    background:linear-gradient(160deg, rgba(82,34,64,.85), rgba(52,20,42,.9)); border:1px solid var(--panel-edge);
    box-shadow:0 10px 24px rgba(15,4,12,.5), inset 0 1px 0 rgba(255,200,222,.1);
    min-width:0; overflow:hidden;}
  .dock-player.p2{flex-direction:row-reverse; text-align:right;}
  .dock-player .dp-av{flex:none; width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-size:21px;
    background:#fff; overflow:hidden; border:2.5px solid;}
  .dock-player.p1 .dp-av{border-color:var(--p1);} .dock-player.p2 .dp-av{border-color:var(--p2);}
  .dock-player .dp-av img{width:100%; height:100%; object-fit:cover;}
  .dock-player .dp-info{flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center;}
  .dock-player .dp-name{display:block; font-size:14.5px; font-weight:800; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff;}
  .dock-player .dp-sq{display:block; font-size:11.5px; color:var(--muted); font-weight:700; margin-top:3px; white-space:nowrap;}
  .dock-player .dp-bar{display:block; height:5px; border-radius:999px; margin-top:6px; overflow:hidden;
    background:rgba(255,255,255,.10); box-shadow:inset 0 1px 1px rgba(0,0,0,.25);}
  .dock-player .dp-fill{display:block; height:100%; border-radius:999px; transition:width .35s cubic-bezier(.34,1.1,.64,1);}
  .dock-player.p1 .dp-fill{background:linear-gradient(90deg,var(--p1),var(--rose));}
  .dock-player.p2 .dp-fill{background:linear-gradient(90deg,var(--p2),var(--plum));}
  .dock-player.active .dp-fill{box-shadow:0 0 8px rgba(255,210,125,.55);}
  /* Cloud account/sync is reached from Settings now, so hide the floating chip */
  #cloudChip{display:none !important;}
  .dock-player.active{border-color:rgba(255,210,125,.7); box-shadow:0 0 0 2px rgba(255,210,125,.45), 0 10px 24px rgba(15,4,12,.5);}
  .dock-player.active .dp-av{box-shadow:0 0 0 3px rgba(255,210,125,.55), 0 0 14px rgba(255,210,125,.4);}
  .dock-player.active .dp-sq{color:var(--gold);}
  .die-col{display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:2px;}
  .die-btn{position:relative; width:78px; height:78px; border-radius:20px; background:linear-gradient(150deg,#fff,#f1e7ee);
    display:grid; place-items:center;
    box-shadow:0 0 0 4px rgba(255,93,143,.28), 0 0 22px 4px rgba(255,93,143,.55), 0 8px 18px rgba(15,4,12,.55), inset 0 -5px 0 rgba(43,15,32,.08);}
  .die-btn:active{transform:translateY(3px); box-shadow:0 0 0 4px rgba(255,93,143,.28), 0 0 18px 3px rgba(255,93,143,.45), 0 4px 10px rgba(15,4,12,.5);}
  .die-btn.spin{animation:wob .12s linear infinite;}
  .die-btn.done{opacity:.45; box-shadow:0 8px 18px rgba(15,4,12,.5);}
  @keyframes wob{0%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}100%{transform:rotate(-8deg)}}
  .pips{width:50px; height:50px; display:grid; grid-template:repeat(3,1fr)/repeat(3,1fr); gap:3px;}
  .pip{border-radius:50%; background:#2b0f20; opacity:0; align-self:center; justify-self:center; width:11px; height:11px;}
  .pip.on{opacity:1;}
  .roll-label{font-weight:900; font-size:12px; letter-spacing:1.6px; text-transform:uppercase; color:var(--rose);
    text-shadow:0 0 10px rgba(255,93,143,.5);}

  /* ---------- Modals (win / setup / help) ---------- */
  .modal-back{position:fixed; inset:0; background:rgba(16,5,12,.8); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:60; padding:18px;}
  .modal{background:linear-gradient(160deg,#46193a,#34132a); border:1px solid var(--panel-edge); border-radius:24px; padding:24px; width:100%; max-width:430px; max-height:92dvh; overflow-y:auto;
    box-shadow:0 24px 60px rgba(10,3,8,.7); animation:popUp .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popUp{from{transform:translateY(26px) scale(.96); opacity:0;} to{transform:none; opacity:1;}}
  .modal h2{font-family:var(--display); font-style:italic; margin:0 0 6px; font-size:24px;}
  .modal .hint{color:var(--muted); font-size:14px; margin:0 0 14px;}
  label{display:block; font-weight:800; font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin:14px 0 6px;}

/* Shuffled deck draw — no repeats until a full cycle, no back-to-back repeats across cycles */
const _deck = {};
function drawQuest(mode, pack){
  pack = pack || (typeof S !== "undefined" && S.questPack) || "together";
  const source = (pack === "apart" ? LOVE_QUESTS_APART : LOVE_QUESTS);
  const deck = source[mode] || LOVE_QUESTS[mode];
  const key = pack + ":" + mode;
  let st = _deck[key];
  if (!st || st.i >= st.order.length){
    const order = deck.map((_,i)=>i);
    for (let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    if (st && order[0] === st.last && order.length > 1) [order[0],order[1]] = [order[1],order[0]];
    st = _deck[key] = { order, i:0, last:-1 };
  }
  const idx = st.order[st.i++]; st.last = idx;
  return deck[idx];
}

/* ---------- Avatar store (IndexedDB) ---------- */
const AvatarDB = (()=>{ let dbp=null;
  const open=()=>dbp||(dbp=new Promise((res,rej)=>{ const r=indexedDB.open("snl-avatars",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("a"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }));
  return {
    put:async(id,b)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").put(b,id); t.oncomplete=res; }); },
    get:async(id)=>{ const db=await open(); return new Promise((res)=>{ const r=db.transaction("a").objectStore("a").get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); },
    del:async(id)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").delete(id); t.oncomplete=res; }); },
  };
})();

   track what's confirmed in the cloud and backfill the rest after each sync. */
const AV_PUSHED_KEY = "snl_avatars_pushed_v1";
const avPushed = (()=>{ try { return new Set(JSON.parse(localStorage.getItem(AV_PUSHED_KEY)||"[]")); } catch { return new Set(); } })();
function avMark(id, on=true){ on ? avPushed.add(id) : avPushed.delete(id); try{ localStorage.setItem(AV_PUSHED_KEY, JSON.stringify([...avPushed])); }catch{} }
async function avatarSync(){
  if (!window.Cloud || !Cloud.isSignedIn()) return;
  for (const i of [1,2]){
    if (avPushed.has("p"+i)) continue;
    try {
      const b = await AvatarDB.get("p"+i);
      if (b && await Cloud.uploadPhoto("avatar-p"+i, b)) avMark("p"+i);
    } catch {}
  }
}

async function loadAvatars(){
  for (const i of [1,2]) {
    let b = await AvatarDB.get("p"+i);
    if (!b && window.Cloud && Cloud.isSignedIn()) { b = await Cloud.getPhoto("avatar-p"+i); if (b) await AvatarDB.put("p"+i, b); }
    if (b) avatarURL[i] = URL.createObjectURL(b);
  }
}

/* ---------- Audio: synthesised romantic loop + SFX ---------- */
const Music = (()=>{ let ctx=null, nodes=null;
  const ensure=()=>{ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch{} } if(ctx&&ctx.state==="suspended")ctx.resume(); return ctx; };
  function tone(f,t0,d,type,g){ const c=ensure(); if(!c)return; const o=c.createOscillator(),gn=c.createGain();
    o.type=type; o.frequency.value=f; gn.gain.setValueAtTime(0.0001,t0); gn.gain.linearRampToValueAtTime(g,t0+0.05); gn.gain.linearRampToValueAtTime(0.0001,t0+d);
    o.connect(gn).connect(nodes?nodes.master:c.destination); o.start(t0); o.stop(t0+d+0.05); }
  return {
    unlock:ensure,
    start(){ const c=ensure(); if(!c||nodes)return;
      const master=c.createGain(); master.gain.value=S.musicEnabled?0.07:0.0001; master.connect(c.destination);
      nodes={master,id:null};
      // slow romantic waltz arpeggio: Am – F – C – G
      const chords=[[220,261.63,329.63],[174.61,220,261.63],[130.81,164.81,196],[196,246.94,293.66]];
      let bar=0;
      const tick=()=>{ if(!nodes)return; const t=c.currentTime, ch=chords[bar%4];
        ch.forEach((f,i)=>tone(f,t+i*0.42,1.15,"sine",1)); tone(ch[0]/2,t,1.4,"triangle",0.7); bar++; };
      nodes.id=setInterval(tick,1400); tick(); },
    setOn(on){ if(!nodes){ if(on)this.start(); return; } const c=ensure(); nodes.master.gain.setTargetAtTime(on?0.07:0.0001,c.currentTime,0.15); },
    sfxClimb(){ const c=ensure(); if(!c)return; const t=c.currentTime; [392,523,659,784].forEach((f,i)=>tone(f,t+i*0.07,0.18,"triangle",0.16)); },
    sfxSlide(){ const c=ensure(); if(!c)return; const t=c.currentTime; const o=c.createOscillator(),g=c.createGain();
      o.type="sawtooth"; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(120,t+0.5);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.55); },
    sfxStep(){ const c=ensure(); if(!c)return; tone(740,c.currentTime,0.05,"sine",0.1); },
    sfxWin(){ const c=ensure(); if(!c)return; const t=c.currentTime; [523,659,784,1046,1318].forEach((f,i)=>tone(f,t+i*0.09,0.25,"triangle",0.18)); },
    sfxLove(){ const c=ensure(); if(!c)return; const t=c.currentTime; [659,830,988].forEach((f,i)=>tone(f,t+i*0.1,0.3,"sine",0.14)); },
  };
})();

const numAt = (rowTop,col) => { const rb=9-rowTop, even=rb%2===0; return even? rb*10+col+1 : rb*10+(9-col)+1; };
function cellCenter(n){ // % coords of tile centre
  const z=n-1, rb=Math.floor(z/10), rowTop=9-rb, pos=z%10, col=(rb%2===0)?pos:9-pos;
  return { x:(col+0.5)*10, y:(rowTop+0.5)*10 };
}

const el=(t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const esc=(t)=>String(t).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const delay=(ms)=>new Promise(r=>setTimeout(r,ms));

/* ---------- Build board DOM + SVG art ---------- */
const boardEl = document.getElementById("board");
function buildBoard(){
  boardEl.innerHTML="";
  for (let r=0;r<10;r++) for (let c=0;c<10;c++){
    const n = numAt(r,c);
    const t = el("div","tile"+((r+c)%2?" alt":"")+(QUEST_TILES.includes(n)?" qt":"")+(n===100?" t100":""));
    t.innerHTML = `<span class="num">${n}</span>${QUEST_TILES.includes(n)?'<span class="love">💗</span>':''}`;
    boardEl.appendChild(t);
  }
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 100 100"); svg.setAttribute("preserveAspectRatio","none"); svg.classList.add("art");
  let art="";
  for (const [f,to] of Object.entries(LADDERS)){
    const a=cellCenter(+f), b=cellCenter(to);
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), ux=dx/len, uy=dy/len, px=-uy, py=ux, w=1.8;
    const rail=(s)=>`M${a.x+px*s} ${a.y+py*s} L${b.x+px*s} ${b.y+py*s}`;
    art+=`<path d="${rail(w)}" stroke="#a06d3c" stroke-width="1.25" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${rail(-w)}" stroke="#a06d3c" stroke-width="1.25" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${rail(w)}" stroke="#d59c64" stroke-width="0.5" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${rail(-w)}" stroke="#d59c64" stroke-width="0.5" fill="none" stroke-linecap="round"/>`;
    const rungs=Math.max(3,Math.floor(len/5));
    for(let i=1;i<rungs;i++){ const t=i/rungs, cx=a.x+dx*t, cy=a.y+dy*t;
      art+=`<line x1="${cx+px*w}" y1="${cy+py*w}" x2="${cx-px*w}" y2="${cy-py*w}" stroke="#bd8550" stroke-width="0.95" stroke-linecap="round"/>`; }
  }
  for (const [f,to] of Object.entries(SNAKES)){
    const a=cellCenter(+f), b=cellCenter(to);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), px=-dy/len, py=dx/len, amp=Math.min(8,len*0.22);
    const c1x=a.x+dx*0.25+px*amp, c1y=a.y+dy*0.25+py*amp, c2x=a.x+dx*0.75-px*amp, c2y=a.y+dy*0.75-py*amp;
    const d=`M${a.x} ${a.y} C${c1x} ${c1y} ${mx} ${my} ${mx} ${my} S${c2x} ${c2y} ${b.x} ${b.y}`;
    art+=`<path d="${d}" stroke="#cf3f6e" stroke-width="2.7" fill="none" stroke-linecap="round" opacity="0.95"/>`;
    art+=`<path d="${d}" stroke="#e85d86" stroke-width="1.9" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${d}" stroke="#ff8fb1" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.7"/>`;
    art+=`<circle cx="${b.x}" cy="${b.y}" r="0.9" fill="#cf3f6e"/>`; // tail tip
  }
  svg.innerHTML = art;
  boardEl.appendChild(svg);
  // snake heads as heart-eyes emoji at the start tile
  for (const f of Object.keys(SNAKES)){
    const a=cellCenter(+f);
    const h=el("div","snake-head"); h.textContent="😍";
    h.style.left=`calc(${a.x}% - 1.9%)`; h.style.top=`calc(${a.y}% - 1.9%)`;
    boardEl.appendChild(h);
  }
  // pawns (map-pins; face/photo lives in the bulb)
  for (const i of [1,2]){
    const p = el("div",`pawn p${i}`); p.id="pawn"+i;
    p.innerHTML = `<span class="tip"></span><span class="pin"><span class="pin-face"></span></span>`;
    boardEl.appendChild(p);
  }
  paintPawns();
}
function pawnFace(i){
  const pl = i===1?S.p1:S.p2;
  if (avatarURL[i]) return `<img src="${avatarURL[i]}" alt="">`;
  return pl.gender==="female" ? "👩" : "👨";
}
function paintPawns(){
  for (const i of [1,2]){
    const pl=i===1?S.p1:S.p2, p=document.getElementById("pawn"+i);

const LOG_ICON = { dice:"🎲", ladder:"🪜", snake:"🐍", heart:"💗", turn:"•", win:"🏆", surprise:"🎁", challenge:"💞" };
function logEvent(kind, title, sub){

function relTime(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if (s<8) return "Just now";
  if (s<60) return s+"s ago";
  const m=Math.floor(s/60); if (m<60) return m+"m ago";
  const h=Math.floor(m/60); if (h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

/* ===================== Remote play: sync layer ===================== */
/* A full game snapshot is the unit of sync — tiny and desync-proof. */
function snapshot(){
  return {
    p1:{ name:S.p1.name, gender:S.p1.gender, position:S.p1.position },
    p2:{ name:S.p2.name, gender:S.p2.gender, position:S.p2.position },
    current:S.current, round:S.round, winner:S.winner,
    loveMode:S.loveMode, difficulty:S.difficulty, ultimatePrompt:S.ultimatePrompt,
    questPack:S.questPack,
    activeQuest:S.activeQuest, log:S.log,
  };
}
let applyingRemote=false;
function applySnapshot(g){
  if (!g) return;
  applyingRemote=true;
  try{
    if (g.p1){ S.p1.name=g.p1.name??S.p1.name; S.p1.gender=g.p1.gender||S.p1.gender; S.p1.position=g.p1.position??S.p1.position; }
    if (g.p2){ S.p2.name=g.p2.name??S.p2.name; S.p2.gender=g.p2.gender||S.p2.gender; S.p2.position=g.p2.position??S.p2.position; }
    if (g.current) S.current=g.current;
    if (typeof g.round==="number") S.round=g.round;
    if (g.loveMode && LOVE_QUESTS[g.loveMode]) S.loveMode=g.loveMode;
    if (g.questPack==="together"||g.questPack==="apart") S.questPack=g.questPack;
    if (g.difficulty==="Easy"||g.difficulty==="Hard") S.difficulty=g.difficulty;
    if (g.ultimatePrompt!==undefined) S.ultimatePrompt=g.ultimatePrompt;
    if (Array.isArray(g.log)) S.log=g.log;
    S.activeQuest = g.activeQuest || null;
    const newWin = g.winner && g.winner!==S.winner;
    S.winner = g.winner || null;
    showDie(1);
    renderAll();
    renderQuestFromState();
    if (newWin){ confetti(); winModal(name(S.winner)); }
  } finally { applyingRemote=false; }
}
/* Broadcast the current state to the partner — no-op outside remote play. */
function rbroadcast(){
  if (S.mode==="remote" && !applyingRemote && window.Remote && Remote.isActive()) {
    try { Remote.push(snapshot()); } catch {}
  }
}
/* This device may roll only on its own turn when playing remotely. */
function canActNow(){ return S.mode!=="remote" || (S.current===S.myPlayer && !S.winner); }
/* Lock the die + show a waiting hint while it is the partner's turn. */
function paintTurnLock(){
  if (typeof dieEl==="undefined" || !dieEl) return;
  if (S.mode!=="remote"){ dieEl.classList.remove("waiting"); return; }
  const mine = S.current===S.myPlayer && !S.winner;
  dieEl.classList.toggle("waiting", !mine);
  if (!mine && !S.winner) setHint(`Waiting for ${name(S.current)} to roll…`);
}

/* ---------- Dice ---------- */
const pipsEl=document.getElementById("pips"), dieEl=document.getElementById("die");
const PIP_MAP={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
for(let i=0;i<9;i++) pipsEl.appendChild(el("span","pip"));
function showDie(v){ [...pipsEl.children].forEach((p,i)=>p.classList.toggle("on", PIP_MAP[v].includes(i))); }
showDie(1);

async function hopTo(i, from, to, stepMs){
  S.animating=true;
  const step = to>from?1:-1;
  const pawnEl = document.getElementById("pawn"+i);
  for (let pos=from+step; step>0?pos<=to:pos>=to; pos+=step){
    (i===1?S.p1:S.p2).position=pos; Music.sfxStep(); paintPawns(); paintStatus();
    if (pawnEl){ pawnEl.classList.remove("hop"); try{ void pawnEl.offsetWidth; }catch{} pawnEl.classList.add("hop"); }
    await delay(stepMs);
  }
  if (pawnEl) pawnEl.classList.remove("hop");
  S.animating=false;
}
async function resolveTransition(i, at){
  const to=TRANSITIONS[at];
  if (to==null) return { finalPos:at, jumped:false, dir:null };
  const dir = to>at ? "ladder" : "snake";
  dir==="ladder" ? Music.sfxClimb() : Music.sfxSlide();
  const pawnEl = document.getElementById("pawn"+i);
  if (pawnEl) pawnEl.classList.add(dir==="ladder"?"climb":"slide");
  await hopTo(i, at, to, dir==="ladder"?90:60);   // snakes feel fast, ladders triumphant
  if (pawnEl) pawnEl.classList.remove("climb","slide");
  return { finalPos:to, jumped:true, dir };
}
function finishTurn(keep, actor){
  if (keep){
    logEvent("turn", `${actor} goes again`, "rolled a 6 ✨");
  } else {
    S.current = S.current===1?2:1;
    if (S.current===1) S.round++;
    logEvent("turn", `${name(S.current)}'s turn`, "");
  }
  paintPawns(); paintStatus(); renderPills(); paintTurnLock();
  rbroadcast();
}
function winModal(actor){
  const back=el("div","modal-back"), box=el("div","modal quest-card modalq");
  box.innerHTML=`<p class="win-title">🎉</p><h2>Congratulations, ${esc(actor)}!</h2>
    <p class="q">${S.ultimatePrompt ? esc(S.ultimatePrompt) : "You have won the game!"}</p>
    ${S.ultimatePrompt?'<small style="color:var(--muted)">The ultimate prompt — winner\'s privilege 💞</small>':""}`;
  const again=el("button","primary-btn","Play again"); again.onclick=()=>{ back.remove(); resetGame(); };
  box.appendChild(again); back.appendChild(box); document.getElementById("overlay").appendChild(back);
}
function showWin(actor){
  S.winner=S.current; Music.sfxWin(); confetti();
  logEvent("win", `${actor} reached 100`, "Game won 🎉");
  renderPills(); paintStatus();
  rbroadcast();
  winModal(actor);
}

async function spin(){
  if (S.winner||S.spinning||S.animating||S.setupOpen) return;
  if (!canActNow()) return;
  if (S.activeQuest){ S.activeQuest=null; hideQuestPopup(); } // previous dare is over once you roll on
  Music.unlock(); if (S.musicEnabled) Music.start();
  const actor=name(S.current), mover=S.current;
  const curPos=(mover===1?S.p1:S.p2).position;
  setHint("Spinning…"); S.spinning=true;
  dieEl.classList.add("spin");
  let tmp=1; const iv=setInterval(()=>{ showDie(tmp); tmp=tmp%6+1; },70);
  await delay(900+Math.floor(Math.random()*400));
  clearInterval(iv); dieEl.classList.remove("spin");
  const roll=Math.floor(Math.random()*6)+1;
  showDie(roll); S.spinning=false;

  if (curPos===0){
    if (S.difficulty==="Hard" && roll!==6){
      logEvent("dice", `${actor} rolled a ${roll}`, "needs a 6 to start");
      finishTurn(false,actor); return;
    }
    logEvent("dice", `${actor} rolled a ${roll}`, "off the start line");
    await hopTo(mover,0,1,120);
    const {finalPos,jumped,dir}=await resolveTransition(mover,1);
    if (jumped) logEvent(dir, `${actor} ${dir==="ladder"?"climbed a ladder":"slid down a snake"}`, `From 1 to ${finalPos}`);
    if (finalPos>=100){ showWin(actor); return; }
    if (jumped) showQuest(drawQuest(S.loveMode), dir, actor, mover);
    finishTurn(roll===6 && !jumped, actor); return;
  }
  if (curPos+roll>100){
    logEvent("dice", `${actor} rolled a ${roll}`, "too high — stays put");
    finishTurn(false,actor); return;
  }
  const target=curPos+roll;
  logEvent("dice", `${actor} rolled a ${roll}`, `moved to ${target}`);
  await hopTo(mover,curPos,target,100);
  const {finalPos,jumped,dir}=await resolveTransition(mover,target);
  if (jumped) logEvent(dir, `${actor} ${dir==="ladder"?"climbed a ladder":"slid down a snake"}`, `From ${target} to ${finalPos}`);
  if (finalPos>=100){ showWin(actor); return; }
  if (jumped){
    showQuest(drawQuest(S.loveMode), dir, actor, mover);
  } else if (QUEST_TILES.includes(finalPos)){
    logEvent("heart", `${actor} landed on ${finalPos}`, "Heart challenge");
    showQuest(drawQuest(S.loveMode), "tile", actor, mover);
  }
  finishTurn(roll===6 && !jumped, actor);
}
function resetGame(){
  S.p1.position=0; S.p2.position=0; S.current=1; S.winner=null; S.spinning=false; S.animating=false;
  S.round=1; S.log=[]; S.activeQuest=null;

  rbroadcast();
}

  const mkName=(i)=>{ const pl=i===1?S.p1:S.p2;
    fields.append(el("label",null,`Player ${i} name`));
    const inp=el("input"); inp.type="text"; inp.value=pl.name; inp.placeholder=i===1?"e.g. Amara":"e.g. Dayo";
    inp.oninput=()=>pl.name=inp.value; fields.append(inp);
    const row=el("div","avatar-row"); row.style.marginTop="8px";
    const prev=el("span","avatar-prev",pawnFace(i));
    const seg=el("div","seg"); seg.style.flex="1";
    [["female","👩 Female"],["male","👨 Male"]].forEach(([g,label])=>{ const b=el("button",pl.gender===g?"sel":"", label);
      b.onclick=()=>{ pl.gender=g; [...seg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); if(!avatarURL[i]) prev.innerHTML=pawnFace(i); }; seg.append(b); });
    const up=el("button","mini-btn","📷"); up.title="Set photo";
    const file=el("input"); file.type="file"; file.accept="image/*"; file.hidden=true;
    up.onclick=()=>file.click();
    file.onchange=async()=>{ const f=file.files[0]; if(!f)return;
      const blob=await downscale(f,300,0.82); await AvatarDB.put("p"+i,blob);
      avMark("p"+i,false);
      if (window.Cloud) Cloud.uploadPhoto("avatar-p"+i, blob).then(ok=>{ if(ok) avMark("p"+i); });
      if (avatarURL[i]) URL.revokeObjectURL(avatarURL[i]);
      avatarURL[i]=URL.createObjectURL(blob); prev.innerHTML=pawnFace(i); };
    const clr=el("button","mini-btn","✕"); clr.title="Remove photo";
    clr.onclick=async()=>{ await AvatarDB.del("p"+i); avMark("p"+i,false); if (window.Cloud) Cloud.deletePhoto("avatar-p"+i); if(avatarURL[i])URL.revokeObjectURL(avatarURL[i]); avatarURL[i]=null; prev.innerHTML=pawnFace(i); };
    row.append(prev,seg,up,clr,file); fields.append(row);
  };
  mkName(1); mkName(2);

  fields.append(el("label",null,"Love quest mode"));
  const modeSeg=el("div","seg");
  Object.keys(LOVE_QUESTS).forEach(m=>{ const b=el("button",S.loveMode===m?"sel":"", m==="Romantic"?"💗 Romantic":m==="Fun"?"😜 Fun":"🔥 Spicy");
    b.onclick=()=>{ S.loveMode=m; [...modeSeg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; modeSeg.append(b); });
  fields.append(modeSeg);

  fields.append(el("label",null,"Difficulty"));
  const diffSeg=el("div","seg");
  ["Easy","Hard"].forEach(d=>{ const b=el("button",S.difficulty===d?"sel":"", d==="Easy"?"Easy · start on any spin":"Hard · need a 6 to start");
    b.onclick=()=>{ S.difficulty=d; [...diffSeg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; diffSeg.append(b); });
  fields.append(diffSeg);

  fields.append(el("label",null,"Ultimate prompt (revealed to the winner)"));
  const fp=el("input"); fp.type="text"; fp.value=S.ultimatePrompt; fp.placeholder="Winner picks date night…";
  fp.oninput=()=>S.ultimatePrompt=fp.value; fields.append(fp);

  const musicRow=el("div","switch-row"); musicRow.append(el("span",null,"🎵 Background music"));
  const tog=el("button","toggle"+(S.musicEnabled?" on":""), S.musicEnabled?"On":"Off");
  tog.onclick=()=>{ S.musicEnabled=!S.musicEnabled; tog.classList.toggle("on",S.musicEnabled); tog.textContent=S.musicEnabled?"On":"Off"; Music.setOn(S.musicEnabled); };
  musicRow.append(tog); fields.append(musicRow);

  // Cloud account & sync — opens the shared account panel (only when sync is available)
  const chip = document.getElementById("cloudChip");
  if (!firstRun && chip){
    fields.append(el("label",null,"Account"));
    const acct=el("button","reset-row", (window.Cloud && Cloud.isSignedIn && Cloud.isSignedIn())
      ? "☁️ Account & sync now" : "☁️ Sign in to sync");
    acct.style.marginTop="6px";
    acct.onclick=()=>{ back.remove(); S.setupOpen=false; chip.click(); };
    fields.append(acct);
  }

  if (!firstRun){
    if (S.mode==="remote"){
      fields.append(el("label",null,"Quest style"));
      const pk=el("div","seg");
      [["together","🛋️ Same room"],["apart","🌍 Long distance"]].forEach(([p,lbl])=>{ const b=el("button",S.questPack===p?"sel":"",lbl);
        b.onclick=()=>{ S.questPack=p; [...pk.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); rbroadcast(); }; pk.append(b); });
      fields.append(pk);
    }
    const goRemote = el("button","reset-row", S.mode==="remote" ? "🚪 Leave remote game" : "🌍 Play remotely — two devices");
    goRemote.onclick = () => {
      back.remove(); S.setupOpen=false;
      if (S.mode==="remote") exitRemote(); else openRemoteLobby();
    };
    fields.append(goRemote);
    const rr = el("button","reset-row","↺ Reset game — positions start over");
    rr.onclick = () => { if (confirm("Reset positions and start over?")){ resetGame(); S.setupOpen=false; back.remove(); } };
    fields.append(rr);
  }
  box.appendChild(fields);
  const start=el("button","primary-btn", firstRun?"Start the game 💘":"Save");
  start.onclick=()=>{
    if (!S.p1.name.trim()||!S.p2.name.trim()){ alert("Please enter both players' names."); return; }
    S.p1.name=S.p1.name.trim(); S.p2.name=S.p2.name.trim();
    savePrefs(); S.setupOpen=false; back.remove();
    buildBoard(); setHint(`${name(S.current)}, ${startRule()}`); paintStatus(); paintPawns(); paintTurnLock();
    rbroadcast();
  };
  box.appendChild(start);
  back.appendChild(box); document.getElementById("overlay").appendChild(back);
}
function downscale(fileBlob,maxSide,q){ return new Promise((res)=>{ const img=new Image();
  img.onload=()=>{ const r=Math.min(1,maxSide/Math.max(img.width,img.height));
    const cv=document.createElement("canvas"); cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>res(b||fileBlob),"image/jpeg",q); URL.revokeObjectURL(img.src); };
  img.onerror=()=>res(fileBlob); img.src=URL.createObjectURL(fileBlob); }); }

/* ===================== Mode lobby + remote play ==================== */
function lobbyModal(){
  const back=el("div","modal-back"), box=el("div","modal");
  back.appendChild(box); document.getElementById("overlay").appendChild(back);
  return { back, box };
}
/* First screen: Pass & Play beside Play Remotely. */
function openLobby(){
  S.setupOpen=true;
  const { back, box } = lobbyModal();
  box.innerHTML = `<h2>How will you play? 💞</h2>
    <p class="hint">Same room, or two phones across the world — your call.</p>`;
  const local=el("button","primary-btn","👫 Pass & Play");
  local.style.marginTop="4px";
  local.onclick=()=>{ back.remove(); S.mode="local"; S.myPlayer=null; openSetup(true); };
  box.appendChild(local);
  const localNote=el("p","hint","Share one device and take turns.");
  localNote.style.margin="6px 2px 14px"; box.appendChild(localNote);

  const remote=el("button","reset-row","🌍 Play Remotely");
  remote.onclick=()=>{ back.remove(); openRemoteLobby(); };
  box.appendChild(remote);
  const remoteNote=el("p","hint","Two devices, one shared board.");
  remoteNote.style.margin="6px 2px 0"; box.appendChild(remoteNote);
}
/* Remote: pick your name, then create or join a room by code. */
function openRemoteLobby(){
  S.setupOpen=true;
  if (!(window.Remote && Remote.available && Remote.available())){
    const { back, box } = lobbyModal();
    box.innerHTML=`<h2>Remote play 🌍</h2><p class="hint">Remote play needs the cloud service, which isn't set up for this copy. You can still play pass-and-play on one device.</p>`;
    const ok=el("button","primary-btn","Back"); ok.onclick=()=>{ back.remove(); openLobby(); };
    box.appendChild(ok); return;
  }
  const { back, box } = lobbyModal();
  let myName = "", myGender = "female", myPack = "together";
  box.innerHTML=`<h2>Play remotely 🌍</h2>
    <p class="hint">You'll each play on your own device. One of you creates a room and shares the code; the other joins it.</p>`;
  box.appendChild(el("label",null,"Your name"));
  const nameInp=el("input"); nameInp.type="text"; nameInp.placeholder="e.g. Amara";
  nameInp.oninput=()=>myName=nameInp.value; box.appendChild(nameInp);

  box.appendChild(el("label",null,"You appear as"));
  const seg=el("div","seg");
  [["female","👩 Her"],["male","👨 Him"]].forEach(([g,lbl])=>{ const b=el("button",g==="female"?"sel":"",lbl);
    b.onclick=()=>{ myGender=g; [...seg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; seg.append(b); });
  box.appendChild(seg);

  box.appendChild(el("label",null,"Where are you two?"));
  const proxSeg=el("div","seg");
  [["together","🛋️ Same room"],["apart","🌍 Long distance"]].forEach(([p,lbl])=>{ const b=el("button",p==="together"?"sel":"",lbl);
    b.onclick=()=>{ myPack=p; [...proxSeg.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; proxSeg.append(b); });
  box.appendChild(proxSeg);
  const proxNote=el("p","hint","Long distance swaps in quests you can do over a video call. The room's creator sets this; whoever joins inherits it.");
  proxNote.style.margin="6px 2px 0"; box.appendChild(proxNote);

  const msg=el("p","hint",""); msg.style.minHeight="16px"; msg.style.color="var(--p1)";

  const createBtn=el("button","primary-btn","Create a room");
  createBtn.style.marginTop="14px";
  createBtn.onclick=()=>{ if(!myName.trim()){ msg.textContent="Please enter your name first."; return; }
    back.remove(); startRemote("host", "", myName.trim(), myGender, myPack); };
  box.appendChild(createBtn);

  const joinBtn=el("button","reset-row","Join with a code");
  joinBtn.onclick=()=>{
    box.querySelectorAll(".join-step").forEach(x=>x.remove());
    if(!myName.trim()){ msg.textContent="Please enter your name first."; return; }
    const wrap=el("div","join-step"); wrap.append(el("label",null,"Room code"));
    const codeInp=el("input"); codeInp.type="text"; codeInp.placeholder="4 letters/numbers";
    codeInp.style.textTransform="uppercase"; codeInp.maxLength=4; wrap.append(codeInp);
    const go=el("button","primary-btn","Join");
    go.onclick=()=>{ const c=(codeInp.value||"").trim().toUpperCase();
      if(!Remote.validCode(c)){ msg.textContent="That code doesn't look right."; return; }
      back.remove(); startRemote("guest", c, myName.trim(), myGender, "together"); };
    wrap.append(go); box.appendChild(wrap); codeInp.focus();
  };
  box.appendChild(joinBtn);
  box.appendChild(msg);
  const cancel=el("button","reset-row","Back");
  cancel.onclick=()=>{ back.remove(); openLobby(); };
  box.appendChild(cancel);
}
function beginRemoteGame(role){
  S.setupOpen=false;
  buildBoard(); renderAll();
  const pk = S.questPack==="apart" ? " · 🌍 long distance" : "";
  if (role==="host") Remote.setBanner("wait","Share this code — waiting for your partner"+pk,{code:Remote.getCode()});
  else Remote.setBanner("wait","Connecting…");
}
function exitRemote(){
  if (window.Remote){ Remote.leave(); Remote.clearBanner && Remote.clearBanner(); }
  S.mode="local"; S.myPlayer=null;
  setHint(`${name(S.current)}, ${startRule()}`);
  renderAll();
}
async function startRemote(role, code, myName, myGender, pack){
  S.mode="remote"; S.myPlayer = role==="host" ? 1 : 2;
  S.questPack = (pack==="apart") ? "apart" : "together"; // guest's value is replaced by the host's first sync
  if (role==="host"){ S.p1.name=myName; S.p1.gender=myGender; }
  else { S.p2.name=myName; S.p2.gender=myGender; }
  const tag = ()=> S.questPack==="apart" ? " · 🌍 long distance" : "";
  const hooks = {
    getState: snapshot,
    applyState: (g)=>{ applySnapshot(g); },
    onHello: (h)=>{ if (h && h.player===2){ S.p2.name=h.name||S.p2.name; S.p2.gender=h.gender||S.p2.gender; renderAll(); } },
    onStart: ()=>{ Remote.setBanner("ok","Connected"+tag()); renderAll(); },
    onPeer: (evt)=>{
      if (evt==="join") Remote.setBanner("ok","Connected"+tag());
      else Remote.setBanner("wait", role==="host"?"Partner left — waiting…":"Waiting for partner…",
        role==="host"?{code:Remote.getCode()}:undefined);
    },
    onStatus: (st)=>{ if (st==="error") Remote.setBanner("err","Connection problem — retrying…");
      else if (st==="closed") Remote.setBanner("err","Disconnected"); },
    onLeave: ()=>{ exitRemote(); },
  };
  try {
    await Remote.start({ role, code, me:{ name:myName, gender:myGender }, hooks });
    beginRemoteGame(role);
  } catch (e) {
    S.mode="local"; S.myPlayer=null;
    alert("Couldn't start remote play: " + (e.message||e));
    openLobby();
  }
}

  const back=el("div","modal-back"), box=el("div","modal help-modal");
  box.innerHTML=`<h2>How to play 💞</h2><ul class="help-list">
    <li>🎲 Tap the die and take turns moving along the board.</li>
    <li>🪜 Ladders lift you up — and earn a Ladder of Love quest.</li>
    <li>🐍 Snakes slide you down — make it up with a Snake's Forfeit.</li>
    <li>💕 Heart tiles draw a love quest. Pick Romantic, Fun or Spicy in Settings.</li>
    <li>💛 Passing any quest is always okay.</li>
    <li>🏆 First to tile 100 wins — and claims the winner's prize set in Settings.</li></ul>`;
  const ok=el("button","primary-btn","Got it 💖"); ok.onclick=()=>back.remove();
  box.appendChild(ok); back.appendChild(box);
  back.onclick=(e)=>{ if(e.target===back) back.remove(); };

}

/* ---------- State extensions for the new UI ---------- */
Object.assign(S, { round:1, log:[], activeQuest:null, mode:"local", myPlayer:null, questPack:"together" });

/* ---------- Wire up controls ---------- */
document.getElementById("die").onclick = spin;
document.getElementById("settingsBtn").onclick = ()=>openSetup(false);
document.getElementById("menuBtn").onclick = openHelp;

document.getElementById("qcDone").onclick = ()=>{
  if (!questControllable()) return;
  if (S.activeQuest && S.activeQuest.who) logEvent("heart", `${S.activeQuest.who} completed a quest`, "💖 well done");
  clearQuest(); rbroadcast();
};
document.getElementById("qcPass").onclick = ()=>{ if(!questControllable()) return; clearQuest(); rbroadcast(); };
document.getElementById("qcClose").onclick = ()=>{ hideQuestPopup(); };

const musicBtn=document.getElementById("musicBtn");
const paintMusicBtn=()=>musicBtn.style.opacity=S.musicEnabled?1:0.45;
musicBtn.onclick=()=>{ S.musicEnabled=!S.musicEnabled; set("snl_music_enabled",S.musicEnabled); Music.unlock(); Music.setOn(S.musicEnabled); if(S.musicEnabled)Music.start(); paintMusicBtn(); };
paintMusicBtn();
addEventListener("pointerdown",function once(){ Music.unlock(); if(S.musicEnabled)Music.start(); removeEventListener("pointerdown",once); });


(async ()=>{
  await loadAvatars();
  buildBoard();
  questIntro();
  renderAll();
  const haveNames=!!(S.p1.name&&S.p2.name);
  if (!haveNames){ openLobby(); }

  /* ---------------- Cloud sync (optional account) ---------------- */
  if (window.Cloud) Cloud.init("couples", {
    collect: () => ({
      p1:{ name:S.p1.name, gender:S.p1.gender }, p2:{ name:S.p2.name, gender:S.p2.gender },
      ultimatePrompt:S.ultimatePrompt, musicEnabled:S.musicEnabled, loveMode:S.loveMode, difficulty:S.difficulty,
    }),
    apply: async (st) => {
      if (st.p1){ S.p1.name=st.p1.name||S.p1.name; S.p1.gender=st.p1.gender||S.p1.gender; }
      if (st.p2){ S.p2.name=st.p2.name||S.p2.name; S.p2.gender=st.p2.gender||S.p2.gender; }
      if (st.ultimatePrompt!==undefined) S.ultimatePrompt=st.ultimatePrompt;
      if (st.musicEnabled!==undefined){ S.musicEnabled=!!st.musicEnabled; Music.setOn(S.musicEnabled); paintMusicBtn(); }
      if (st.loveMode && LOVE_QUESTS[st.loveMode]) S.loveMode=st.loveMode;
      if (st.difficulty==="Easy"||st.difficulty==="Hard") S.difficulty=st.difficulty;
      set("snl_p1_name",S.p1.name); set("snl_p2_name",S.p2.name);
      set("snl_p1_gender",S.p1.gender); set("snl_p2_gender",S.p2.gender);
      set("snl_final_prompt",S.ultimatePrompt); set("snl_music_enabled",S.musicEnabled);
      set("snl_love_mode",S.loveMode); set("snl_difficulty",S.difficulty);
      await loadAvatars();
      avatarSync();
      buildBoard();
      if (!S.activeQuest) questIntro();
      renderAll();
    },
  });
  if (window.Cloud) avatarSync();
})();
if ("serviceWorker" in navigator) addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>

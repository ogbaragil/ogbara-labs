<title>Couples Snakes &amp; Ladders</title>

<style>
  :root{
    --bg:#2b0f20; --bg2:#3a1530; --panel:#451a37; --panel2:#552243;
    --ink:#fdeef4; --muted:#d4a8bd; --line:rgba(253,238,244,.12);
    --rose:#ff8fb1; --rose-deep:#f25287; --plum:#b07ddb; --gold:#ffd27d; --mint:#8de0b9;
    --p1:#ff8fb1; --p2:#b07ddb;
    --board:#fdf6f9; --tile-line:#e7cdd9; --num:#7a4a61;
    --display:"Lora", Georgia, serif; --body:"Nunito Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0; font-family:var(--body); color:var(--ink); min-height:100dvh; display:flex; flex-direction:column;
       background:radial-gradient(900px 480px at 80% -10%, rgba(255,143,177,.14), transparent 55%),
                  radial-gradient(700px 520px at -10% 50%, rgba(176,125,219,.12), transparent 55%), var(--bg);
       padding-top:env(safe-area-inset-top); padding-bottom:calc(136px + env(safe-area-inset-bottom)); user-select:none;}
  button,input{font-family:inherit;} button{cursor:pointer; border:none;}
  .wrap{flex:1; width:100%; max-width:980px; margin:0 auto; padding:14px 14px 18px; display:flex; flex-direction:column; gap:12px;}

  header{display:flex; justify-content:space-between; align-items:center;}
  h1{font-family:var(--display); font-style:italic; font-weight:700; font-size:clamp(20px,5vw,28px); margin:0; letter-spacing:.2px;}
  h1 .amp{color:var(--rose);}
  .icon-btns{display:flex; gap:8px;}
  .icon-btn{width:40px; height:40px; border-radius:13px; background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:17px; display:grid; place-items:center;}

  .layout{flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; min-height:0;}

  /* Board — the hero. One surface, no frames. */
  .board-outer{position:relative; width:100%; max-width:min(600px, calc(100dvh - 260px)); margin:0 auto;}
  .board{position:relative; width:100%; aspect-ratio:1; background:var(--board); border-radius:18px; overflow:hidden;
         display:grid; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(10,1fr);
         box-shadow:0 18px 44px rgba(20,6,15,.5), inset 0 0 0 1px rgba(122,74,97,.25);}
  .tile{position:relative;}
  .tile.alt{background:#f7e7ef;}
  .tile.qt{background:radial-gradient(circle at 50% 55%, rgba(255,143,177,.34), rgba(255,143,177,.12) 70%);}
  .tile .num{position:absolute; top:2px; left:3px; font-size:clamp(6.5px,1.5vw,9.5px); font-weight:800; color:#b48ba0; line-height:1;}
  .tile .love{position:absolute; bottom:1px; right:2px; font-size:clamp(9px,2.2vw,13px); line-height:1;}
  .tile.t100{background:linear-gradient(135deg,#ffd9e9,#e9d4ff);}
  .tile.t100::after{content:"💞"; position:absolute; inset:0; display:grid; place-items:center; font-size:clamp(13px,3.4vw,22px);}
  .tile.t100 .num{color:#9a5a78;}
  svg.art{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; filter:drop-shadow(0 1px 1px rgba(122,74,97,.35));}

  .pawn{position:absolute; width:8.5%; aspect-ratio:1; border-radius:50%; display:grid; place-items:center;
        font-size:clamp(12px,3vw,18px); transition:left .12s linear, top .12s linear; z-index:5;
        border:2.5px solid; background:#fff; box-shadow:0 3px 8px rgba(43,15,32,.35); overflow:hidden;}
  .pawn img{width:100%; height:100%; object-fit:cover;}
  .pawn.p1{border-color:var(--p1);} .pawn.p2{border-color:var(--p2);}
  .pawn.active{box-shadow:0 0 0 3px rgba(255,210,125,.65), 0 3px 8px rgba(43,15,32,.4);}
  .pawn.hop{animation:hopArc .14s ease-out;}
  @keyframes hopArc{0%{margin-top:0}45%{margin-top:-2.6%}100%{margin-top:0}}
  .pawn.climb{box-shadow:0 0 0 4px rgba(255,210,125,.85), 0 0 18px rgba(255,210,125,.8); animation:climbPulse .35s ease-in-out infinite;}
  @keyframes climbPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .pawn.slide{animation:slideShake .18s linear infinite; filter:saturate(1.5) hue-rotate(-12deg);}
  @keyframes slideShake{0%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}100%{transform:rotate(-6deg)}}

  /* Fixed dock: ticker, chips flanking the die. The die IS the spin button. */
  .dock{position:fixed; left:0; right:0; bottom:0; z-index:40;
        background:rgba(58,21,48,.94); backdrop-filter:blur(10px);
        border-top:1px solid var(--line);
        padding:10px 14px calc(12px + env(safe-area-inset-bottom));}
  .dock-inner{max-width:600px; margin:0 auto;}
  .turn-line{font-family:var(--display); font-style:italic; font-size:16.5px; margin:0; text-align:center;}
  .event-line{color:var(--muted); font-size:12.5px; min-height:17px; margin:2px 0 8px; text-align:center;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .dock-row{display:flex; align-items:center; gap:12px;}
  .chip-slot{flex:1; min-width:0;}
  .pchip{display:flex; align-items:center; gap:9px; background:var(--panel2); border-radius:16px; padding:9px 11px; border:1.5px solid transparent;}
  .pchip.active{border-color:var(--gold); box-shadow:0 0 14px rgba(255,210,125,.25);}
  .pchip .dotface{width:34px; height:34px; border-radius:50%; border:2.5px solid; display:grid; place-items:center; font-size:17px; background:#fff; flex:none; overflow:hidden;}
  .pchip .dotface img{width:100%;height:100%;object-fit:cover;}
  .pchip.one .dotface{border-color:var(--p1);} .pchip.two .dotface{border-color:var(--p2);}
  .pmeta{min-width:0; flex:1;}
  .pmeta b{display:block; font-size:13.5px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar{display:block; height:5px; border-radius:999px; background:rgba(253,238,244,.14); margin-top:5px; overflow:hidden;}
  .bar .fill{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--rose-deep),var(--plum)); transition:width .25s ease;}

  .die-btn{flex:none; width:74px; height:74px; border-radius:20px; background:#fff;
           display:grid; place-items:center; position:relative;
           box-shadow:0 6px 0 rgba(20,6,15,.55), 0 10px 22px rgba(20,6,15,.5), inset 0 -4px 0 rgba(43,15,32,.08);
           transition:transform .1s, box-shadow .1s, opacity .25s;}
  .die-btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(20,6,15,.55), 0 6px 14px rgba(20,6,15,.5);}
  .die-btn.spin{animation:wob .12s linear infinite;}
  .die-btn.done{opacity:.45;}
  .die-btn::after{content:"tap to spin"; position:absolute; bottom:-2px; left:0; right:0; text-align:center;
                  font-size:8px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color:#b48ba0;}
  @keyframes wob{0%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}100%{transform:rotate(-7deg)}}
  .pips{width:50px; height:50px; display:grid; grid-template:repeat(3,1fr)/repeat(3,1fr); gap:3px;}
  .pip{border-radius:50%; background:#2b0f20; opacity:0; align-self:center; justify-self:center; width:11px; height:11px;}
  .pip.on{opacity:1;}

  .reset-row{width:100%; margin-top:16px; padding:12px; border-radius:12px; background:var(--panel2);
             color:var(--muted); border:1px solid var(--line); font-weight:700; font-size:14px;}

  /* Drama */
  .modal{animation:popUp .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popUp{from{transform:translateY(26px) scale(.96); opacity:0;} to{transform:none; opacity:1;}}
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden;}
  .confetti span{position:absolute; top:-14px; width:8px; height:13px; border-radius:2px; animation:confFall 3s linear forwards;}
  @keyframes confFall{to{transform:translateY(112vh) rotate(540deg);}}

  /* Modals */
  .modal-back{position:fixed; inset:0; background:rgba(20,6,15,.78); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:18px;}
  .modal{background:var(--panel); border:1px solid var(--line); border-radius:24px; padding:24px; width:100%; max-width:430px; max-height:92dvh; overflow-y:auto;}
  .modal h2{font-family:var(--display); font-style:italic; margin:0 0 6px; font-size:24px;}
  .modal .hint{color:var(--muted); font-size:14px; margin:0 0 14px;}
  label{display:block; font-weight:700; font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin:14px 0 6px;}
  input[type=text]{width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:16px; outline:none;}
  input[type=text]:focus{border-color:var(--rose);}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{flex:1; min-width:72px; padding:10px 8px; border-radius:12px; background:var(--panel2); color:var(--muted); font-weight:700; font-size:13.5px; border:1.5px solid transparent;}
  .seg button.sel{background:rgba(255,143,177,.16); color:var(--ink); border-color:var(--rose);}
  .avatar-row{display:flex; align-items:center; gap:10px;}
  .avatar-prev{width:46px; height:46px; border-radius:50%; border:2.5px solid var(--rose); background:#fff; display:grid; place-items:center; font-size:22px; overflow:hidden; flex:none;}
  .avatar-prev img{width:100%;height:100%;object-fit:cover;}
  .mini-btn{padding:9px 13px; border-radius:11px; background:var(--panel2); color:var(--ink); border:1px solid var(--line); font-weight:700; font-size:13px;}
  .primary-btn{width:100%; margin-top:20px; padding:14px; border-radius:14px; background:linear-gradient(135deg,var(--rose-deep),var(--plum)); color:#fff; font-weight:800; font-size:16px;}
  .quest-card{text-align:center;}
  .quest-card .qicon{font-size:44px;}
  .quest-card p.q{font-family:var(--display); font-style:italic; font-size:19px; line-height:1.5; margin:10px 0;}
  .quest-card .qwho{display:inline-block; margin:8px auto 0; padding:4px 13px; border-radius:999px;
    background:rgba(255,143,177,.15); border:1px solid rgba(255,143,177,.45); color:var(--rose);
    font-weight:800; font-size:12.5px; letter-spacing:.3px;}
  .quest-card .qsub{color:var(--muted); font-size:13px; margin:6px 0 0;}
  .quest-actions{display:flex; gap:10px; margin-top:14px;}
  .quest-actions .soft-btn{flex:1; background:rgba(255,255,255,.08); color:inherit; border:1px solid rgba(255,255,255,.18); border-radius:12px; padding:12px; font-weight:700;}
  .quest-actions .primary-btn{flex:1.4; margin-top:0;}
  .quest-card small{color:var(--muted);}
  .win-title{font-size:42px; margin:0;}
  .switch-row{display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-weight:700; font-size:15px;}
  .toggle{min-width:58px; padding:8px 0; border-radius:999px; background:var(--panel2); color:var(--muted); font-weight:800; border:1px solid var(--line);}
  .toggle.on{background:rgba(141,224,185,.16); color:var(--mint); border-color:var(--mint);}
  .footer{font-size:11.5px; color:#9a6b82; text-align:center;}
  .footer a{color:inherit; text-decoration:underline; text-underline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>

<div class="wrap">

<script>
"use strict";
/* ===== Couples Snakes & Ladders — PWA port =====
   Original Expo features kept: 2 players w/ names+gender+avatar, Easy/Hard start rule,
   love quests (Romantic/Fun/Spicy), SVG snakes & ladders, extra turn on 6, exact-100 rule,
   final "ultimate prompt" on win. Music synthesised (no mp3 needed). */

const COLS = 10;
const LADDERS = { 6:26, 18:43, 28:48, 44:64, 51:77, 62:81, 73:95 };
const SNAKES  = { 24:3, 41:21, 53:31, 68:47, 84:63, 91:71, 96:75 };
const TRANSITIONS = { ...LADDERS, ...SNAKES };

const LOVE_QUESTS = {
  Romantic: [

  Spicy: [

    "Tell your partner about a time you couldn't stop thinking about them at the worst moment.",
    "Hold a hug five seconds longer than feels normal.",
    "Whisper a one-sentence invitation for later tonight.",
    "Give your partner a slow 10-second kiss on the neck.",
    "Describe your partner's best feature — take your time.",
    "Let your partner pose you for a flattering photo. They keep it.",
    "Play with your partner's hair for 30 seconds.",
    "Tell your partner what scent of theirs undoes you.",
    "Stand close, hands on waists, sway for 20 seconds — no music needed.",
    "Tell your partner one thing you find unbearably attractive that they don't even notice doing.",

    "Make eye contact and count three things you want to say with it. Say one.",
  ],

/* Heart tiles: extra quest triggers, chosen to never collide with snake/ladder ends */
const QUEST_TILES = [7,15,25,36,49,58,70,88];
/* Shuffled deck draw — no repeats until a full cycle, no back-to-back repeats across cycles */
const _deck = {};
function drawQuest(mode){
  const deck = LOVE_QUESTS[mode];
  let st = _deck[mode];
  if (!st || st.i >= st.order.length){
    const order = deck.map((_,i)=>i);
    for (let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    if (st && order[0] === st.last && order.length > 1) [order[0],order[1]] = [order[1],order[0]];
    st = _deck[mode] = { order, i:0, last:-1 };
  }
  const idx = st.order[st.i++]; st.last = idx;
  return deck[idx];
}

/* ---------- Persistence (mirrors snl_* keys) ---------- */
const get = (k,d)=>{ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch{ return d; } };
const set = (k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch{} };

const S = {
  p1: { name:get("snl_p1_name",""), gender:get("snl_p1_gender","female"), color:"var(--p1)", position:0 },
  p2: { name:get("snl_p2_name",""), gender:get("snl_p2_gender","male"),   color:"var(--p2)", position:0 },
  ultimatePrompt: get("snl_final_prompt",""),
  musicEnabled: get("snl_music_enabled","true")==="true",
  loveMode: LOVE_QUESTS[get("snl_love_mode","Romantic")] ? get("snl_love_mode","Romantic") : "Romantic",
  difficulty: get("snl_difficulty","Easy")==="Hard" ? "Hard" : "Easy",
  current: 1, winner:null, spinning:false, animating:false, setupOpen:false,
};
function savePrefs(){
  set("snl_p1_name",S.p1.name); set("snl_p2_name",S.p2.name);
  set("snl_p1_gender",S.p1.gender); set("snl_p2_gender",S.p2.gender);
  set("snl_final_prompt",S.ultimatePrompt); set("snl_music_enabled",S.musicEnabled);
  set("snl_love_mode",S.loveMode); set("snl_difficulty",S.difficulty);
  if (window.Cloud) Cloud.schedulePush();
}

/* ---------- Avatar store (IndexedDB) ---------- */
const AvatarDB = (()=>{ let dbp=null;
  const open=()=>dbp||(dbp=new Promise((res,rej)=>{ const r=indexedDB.open("snl-avatars",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("a"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }));
  return {
    put:async(id,b)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").put(b,id); t.oncomplete=res; }); },
    get:async(id)=>{ const db=await open(); return new Promise((res)=>{ const r=db.transaction("a").objectStore("a").get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); },
    del:async(id)=>{ const db=await open(); return new Promise((res)=>{ const t=db.transaction("a","readwrite"); t.objectStore("a").delete(id); t.oncomplete=res; }); },
  };
})();
const avatarURL = { 1:null, 2:null };
/* Avatars uploaded while signed out are silently dropped by Cloud.uploadPhoto —
   track what's confirmed in the cloud and backfill the rest after each sync. */
const AV_PUSHED_KEY = "snl_avatars_pushed_v1";
const avPushed = (()=>{ try { return new Set(JSON.parse(localStorage.getItem(AV_PUSHED_KEY)||"[]")); } catch { return new Set(); } })();
function avMark(id, on=true){ on ? avPushed.add(id) : avPushed.delete(id); try{ localStorage.setItem(AV_PUSHED_KEY, JSON.stringify([...avPushed])); }catch{} }
async function avatarSync(){
  if (!window.Cloud || !Cloud.isSignedIn()) return;
  for (const i of [1,2]){
    if (avPushed.has("p"+i)) continue;
    try {
      const b = await AvatarDB.get("p"+i);
      if (b && await Cloud.uploadPhoto("avatar-p"+i, b)) avMark("p"+i);
    } catch {}
  }
}

async function loadAvatars(){
  for (const i of [1,2]) {
    let b = await AvatarDB.get("p"+i);
    if (!b && window.Cloud && Cloud.isSignedIn()) { b = await Cloud.getPhoto("avatar-p"+i); if (b) await AvatarDB.put("p"+i, b); }
    if (b) avatarURL[i] = URL.createObjectURL(b);

/* ---------- Audio: synthesised romantic loop + SFX ---------- */
const Music = (()=>{ let ctx=null, nodes=null;
  const ensure=()=>{ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch{} } if(ctx&&ctx.state==="suspended")ctx.resume(); return ctx; };
  function tone(f,t0,d,type,g){ const c=ensure(); if(!c)return; const o=c.createOscillator(),gn=c.createGain();
    o.type=type; o.frequency.value=f; gn.gain.setValueAtTime(0.0001,t0); gn.gain.linearRampToValueAtTime(g,t0+0.05); gn.gain.linearRampToValueAtTime(0.0001,t0+d);
    o.connect(gn).connect(nodes?nodes.master:c.destination); o.start(t0); o.stop(t0+d+0.05); }
  return {
    unlock:ensure,
    start(){ const c=ensure(); if(!c||nodes)return;
      const master=c.createGain(); master.gain.value=S.musicEnabled?0.07:0.0001; master.connect(c.destination);
      nodes={master,id:null};
      // slow romantic waltz arpeggio: Am – F – C – G
      const chords=[[220,261.63,329.63],[174.61,220,261.63],[130.81,164.81,196],[196,246.94,293.66]];
      let bar=0;
      const tick=()=>{ if(!nodes)return; const t=c.currentTime, ch=chords[bar%4];
        ch.forEach((f,i)=>tone(f,t+i*0.42,1.15,"sine",1)); tone(ch[0]/2,t,1.4,"triangle",0.7); bar++; };
      nodes.id=setInterval(tick,1400); tick(); },
    setOn(on){ if(!nodes){ if(on)this.start(); return; } const c=ensure(); nodes.master.gain.setTargetAtTime(on?0.07:0.0001,c.currentTime,0.15); },
    sfxClimb(){ const c=ensure(); if(!c)return; const t=c.currentTime; [392,523,659,784].forEach((f,i)=>tone(f,t+i*0.07,0.18,"triangle",0.16)); },
    sfxSlide(){ const c=ensure(); if(!c)return; const t=c.currentTime; const o=c.createOscillator(),g=c.createGain();
      o.type="sawtooth"; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(120,t+0.5);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.55); },
    sfxStep(){ const c=ensure(); if(!c)return; tone(740,c.currentTime,0.05,"sine",0.1); },
    sfxWin(){ const c=ensure(); if(!c)return; const t=c.currentTime; [523,659,784,1046,1318].forEach((f,i)=>tone(f,t+i*0.09,0.25,"triangle",0.18)); },
    sfxLove(){ const c=ensure(); if(!c)return; const t=c.currentTime; [659,830,988].forEach((f,i)=>tone(f,t+i*0.1,0.3,"sine",0.14)); },
  };
})();

/* ---------- Board geometry ---------- */
const numAt = (rowTop,col) => { const rb=9-rowTop, even=rb%2===0; return even? rb*10+col+1 : rb*10+(9-col)+1; };
function cellCenter(n){ // % coords of tile centre
  const z=n-1, rb=Math.floor(z/10), rowTop=9-rb, pos=z%10, col=(rb%2===0)?pos:9-pos;
  return { x:(col+0.5)*10, y:(rowTop+0.5)*10 };
}

const el=(t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const esc=(t)=>String(t).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const delay=(ms)=>new Promise(r=>setTimeout(r,ms));

/* ---------- Build board DOM + SVG art ---------- */
const boardEl = document.getElementById("board");
function buildBoard(){
  boardEl.innerHTML="";
  for (let r=0;r<10;r++) for (let c=0;c<10;c++){
    const n = numAt(r,c);
    const t = el("div","tile"+((r+c)%2?" alt":"")+(QUEST_TILES.includes(n)?" qt":"")+(n===100?" t100":""));
    t.innerHTML = `<span class="num">${n}</span>${QUEST_TILES.includes(n)?'<span class="love">💕</span>':''}`;
    boardEl.appendChild(t);
  }
  // SVG snakes & ladders
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 100 100"); svg.setAttribute("preserveAspectRatio","none"); svg.classList.add("art");
  let art="";
  for (const [f,to] of Object.entries(LADDERS)){
    const a=cellCenter(+f), b=cellCenter(to);
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), ux=dx/len, uy=dy/len, px=-uy, py=ux, w=1.7;
    const rail=(s)=>`M${a.x+px*s} ${a.y+py*s} L${b.x+px*s} ${b.y+py*s}`;
    art+=`<path d="${rail(w)}" stroke="#b07a4a" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;
    art+=`<path d="${rail(-w)}" stroke="#b07a4a" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;
    const rungs=Math.max(3,Math.floor(len/5));
    for(let i=1;i<rungs;i++){ const t=i/rungs, cx=a.x+dx*t, cy=a.y+dy*t;
      art+=`<line x1="${cx+px*w}" y1="${cy+py*w}" x2="${cx-px*w}" y2="${cy-py*w}" stroke="#c98f5c" stroke-width="0.85" stroke-linecap="round"/>`; }
  }
  for (const [f,to] of Object.entries(SNAKES)){
    const a=cellCenter(+f), b=cellCenter(to);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy), px=-dy/len, py=dx/len, amp=Math.min(8,len*0.22);
    const c1x=a.x+dx*0.25+px*amp, c1y=a.y+dy*0.25+py*amp, c2x=a.x+dx*0.75-px*amp, c2y=a.y+dy*0.75-py*amp;
    art+=`<path d="M${a.x} ${a.y} C${c1x} ${c1y} ${mx} ${my} ${mx} ${my} S${c2x} ${c2y} ${b.x} ${b.y}" stroke="#e0517a" stroke-width="1.9" fill="none" stroke-linecap="round" opacity="0.85"/>`;
    art+=`<circle cx="${a.x}" cy="${a.y}" r="1.9" fill="#c2275a"/>`;
    art+=`<circle cx="${a.x-0.55}" cy="${a.y-0.5}" r="0.4" fill="#fff"/><circle cx="${a.x+0.55}" cy="${a.y-0.5}" r="0.4" fill="#fff"/>`;
  }
  svg.innerHTML = art;
  boardEl.appendChild(svg);
  // pawns
  for (const i of [1,2]){
    const p = el("div",`pawn p${i}`); p.id="pawn"+i;
    boardEl.appendChild(p);
  }
  paintPawns();
}
function pawnFace(i){
  const pl = i===1?S.p1:S.p2;
  if (avatarURL[i]) return `<img src="${avatarURL[i]}" alt="">`;
  return pl.gender==="female" ? "👩" : pl.gender==="neutral" ? "🧑" : "👨";
}
function paintPawns(){
  for (const i of [1,2]){
    const pl=i===1?S.p1:S.p2, p=document.getElementById("pawn"+i);
    p.innerHTML = pawnFace(i);
    p.classList.toggle("active", S.current===i && !S.winner);

    const off = (S.p1.position===S.p2.position) ? (i===1?-2.2:2.2) : 0;
    p.style.left = `calc(${x+off}% - 4.25%)`;

/* ---------- Game flow (faithful to original) ---------- */
async function hopTo(i, from, to, stepMs){
  S.animating=true;
  const step = to>from?1:-1;
  const pawnEl = document.getElementById("pawn"+i);
  for (let pos=from+step; step>0?pos<=to:pos>=to; pos+=step){
    (i===1?S.p1:S.p2).position=pos; Music.sfxStep(); paintPawns(); paintStatus();
    if (pawnEl){ pawnEl.classList.remove("hop"); try{ void pawnEl.offsetWidth; }catch{} pawnEl.classList.add("hop"); }
    await delay(stepMs);
  }
  if (pawnEl) pawnEl.classList.remove("hop");
  S.animating=false;
}
async function resolveTransition(i, at){
  const to=TRANSITIONS[at];
  if (to==null) return {finalPos:at, jumped:false};
  const dir = to>at?"ladder":"snake";
  setEvent(lastEvent.textContent+` (${dir} to ${to})`);
  dir==="ladder"?Music.sfxClimb():Music.sfxSlide();
  const pawnEl = document.getElementById("pawn"+i);
  if (pawnEl) pawnEl.classList.add(dir==="ladder"?"climb":"slide");
  await hopTo(i, at, to, dir==="ladder"?90:60);   // snakes feel fast, ladders triumphant
  if (pawnEl) pawnEl.classList.remove("climb","slide");
  return {finalPos:to, jumped:true};
}
function finishTurn(keep, actor){
  if (keep) setHint(`${actor} gets another turn ✨`);
  else { S.current = S.current===1?2:1; setHint(`Your turn, ${name(S.current)}`); }
  paintPawns(); paintStatus();
}
function confetti(){
  try { if (matchMedia("(prefers-reduced-motion: reduce)").matches) return; } catch {}
  const wrap = el("div","confetti");

  for (let k=0;k<70;k++){

    p.style.left = (Math.random()*100)+"%";

    wrap.appendChild(p);

  setTimeout(()=>wrap.remove(), 4600);
}
function showWin(actor){

  box.appendChild(again); back.appendChild(box); document.getElementById("overlay").appendChild(back);

function showQuest(text, kind="tile", who=""){
  Music.sfxLove();
  const FRAME = {
    tile:   { icon:"💕", title:"Love Quest!",     sub:"" },
    ladder: { icon:"🪜", title:"Ladder of Love!", sub:"You climbed — celebrate with this:" },
    snake:  { icon:"🐍", title:"Snake's Forfeit", sub:"Slithered down… make it up to your partner:" },
  };
  const f = FRAME[kind] || FRAME.tile;
  const back=el("div","modal-back"), box=el("div","modal quest-card");
  box.innerHTML=`<p class="qicon">${f.icon}</p><h2>${f.title}</h2>
    ${who?`<p class="qwho">💌 ${esc(who)}, this one's yours</p>`:""}
    ${f.sub?`<p class="qsub">${f.sub}</p>`:""}
    <p class="q">${text}</p>
    <small>Always tasteful &amp; consensual — passing is always okay.</small>`;
  const row=el("div","quest-actions");

async function spin(){
  if (S.winner||S.spinning||S.animating||S.setupOpen) return;
  Music.unlock(); if (S.musicEnabled) Music.start();
  const actor=name(S.current), mover=S.current;
  const curPos=(mover===1?S.p1:S.p2).position;
  setEvent(""); setHint("Spinning…"); S.spinning=true;
  dieEl.classList.add("spin");
  let tmp=1; const iv=setInterval(()=>{ showDie(tmp); tmp=tmp%6+1; },70);
  await delay(900+Math.floor(Math.random()*400));
  clearInterval(iv); dieEl.classList.remove("spin");
  const roll=Math.floor(Math.random()*6)+1;
  showDie(roll); S.spinning=false;

  if (curPos===0){
    if (S.difficulty==="Hard" && roll!==6){
      setEvent(`${actor} spun ${roll} but needs a 6 to start`);
      finishTurn(false,actor); return;
    }
    setEvent(`${actor} spun ${roll} → 0 → 1`);
    await hopTo(mover,0,1,120);
    const {finalPos,jumped}=await resolveTransition(mover,1);
    if (finalPos>=100){ showWin(actor); return; }
    finishTurn(roll===6&&!jumped,actor); return;
  }
  if (curPos+roll>100){
    setEvent(`${actor} spun ${roll} but cannot overshoot 100`);
    finishTurn(false,actor); return;
  }
  const target=curPos+roll;
  setEvent(`${actor} spun ${roll} → ${curPos} → ${target}`);
  await hopTo(mover,curPos,target,100);
  const {finalPos,jumped}=await resolveTransition(mover,target);
  if (finalPos>=100){ showWin(actor); return; }
  if (jumped){
    const kind = finalPos > target ? "ladder" : "snake";   // climbed up, or slid down
    setEvent(lastEvent.textContent + (kind==="ladder" ? " • Ladder quest! 🪜" : " • Snake forfeit! 🐍"));
    showQuest(drawQuest(S.loveMode), kind, actor);
  } else if (QUEST_TILES.includes(finalPos)){
    setEvent(lastEvent.textContent + " • Love Quest! 💕");
    showQuest(drawQuest(S.loveMode), "tile", actor);
  }
  finishTurn(roll===6&&!jumped,actor);
}
function resetGame(){
  S.p1.position=0; S.p2.position=0; S.current=1; S.winner=null; S.spinning=false; S.animating=false;
  setEvent(""); showDie(1); setHint(`${name(1)}, ${startRule()}`); paintPawns(); paintStatus();
}

function downscale(fileBlob,maxSide,q){ return new Promise((res)=>{ const img=new Image();
  img.onload=()=>{ const r=Math.min(1,maxSide/Math.max(img.width,img.height));
    const cv=document.createElement("canvas"); cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>res(b||fileBlob),"image/jpeg",q); URL.revokeObjectURL(img.src); };
  img.onerror=()=>res(fileBlob); img.src=URL.createObjectURL(fileBlob); }); }

    collect: () => ({
      p1:{ name:S.p1.name, gender:S.p1.gender }, p2:{ name:S.p2.name, gender:S.p2.gender },
      ultimatePrompt:S.ultimatePrompt, musicEnabled:S.musicEnabled, loveMode:S.loveMode, difficulty:S.difficulty,
    }),
    apply: async (st) => {
      if (st.p1){ S.p1.name=st.p1.name||S.p1.name; S.p1.gender=st.p1.gender||S.p1.gender; }
      if (st.p2){ S.p2.name=st.p2.name||S.p2.name; S.p2.gender=st.p2.gender||S.p2.gender; }
      if (st.ultimatePrompt!==undefined) S.ultimatePrompt=st.ultimatePrompt;
      if (st.musicEnabled!==undefined){ S.musicEnabled=!!st.musicEnabled; Music.setOn(S.musicEnabled); paintMusicBtn(); }
      if (st.loveMode && LOVE_QUESTS[st.loveMode]) S.loveMode=st.loveMode;
      if (st.difficulty==="Easy"||st.difficulty==="Hard") S.difficulty=st.difficulty;
      set("snl_p1_name",S.p1.name); set("snl_p2_name",S.p2.name);
      set("snl_p1_gender",S.p1.gender); set("snl_p2_gender",S.p2.gender);
      set("snl_final_prompt",S.ultimatePrompt); set("snl_music_enabled",S.musicEnabled);
      set("snl_love_mode",S.loveMode); set("snl_difficulty",S.difficulty);
      await loadAvatars();
      avatarSync();
      buildBoard(); paintStatus();
      if (!S.winner && !S.spinning && !S.animating) setHint(`${name(S.current)}, ${startRule()}`);
    },
  });
  if (window.Cloud) avatarSync();
})();
if ("serviceWorker" in navigator) addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Brainy Trails — maths adventures for kids</title>
<meta name="description" content="A maths adventure map for ages 5–11. Practice skills, level up to mastery, and watch your trail light up.">
<meta name="theme-color" content="#f7f4ef">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{
    --bg:#f7f4ef; --panel:#ffffff; --ink:#2e2456; --muted:#685e95; --line:#e7e1f2;
    --violet:#7c4dff; --violet2:#a78bfa; --sun:#f59e0b; --gold:#fbbf24;
    /* --muted darkened for WCAG-friendlier small text */
    --mint:#10b981; --sky:#0ea5e9; --coral:#f43f5e;
  }
  /* Brand font: Apple devices get SF Pro Rounded; everyone else falls back to a
     plain system font. To give Android/Windows the same rounded feel, drop a
     rounded woff2 (e.g. Baloo 2, Nunito, Quicksand) into ./fonts/, then:
       1) uncomment the @font-face below and 2) add "BT Rounded" to the stack
       3) add "./fonts/rounded.woff2" to sw.js ASSETS so it caches offline.
     See fonts/README.md. (Left inert by default so nothing 404s.) */
  /* @font-face{font-family:"BT Rounded"; src:url("./fonts/rounded.woff2") format("woff2");
       font-weight:400 900; font-display:swap;} */
  *{margin:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  body:has(.modal-back){overflow:hidden;}   /* nothing behind a modal moves */
  html,body{height:100%;}
  body{background:var(--bg); color:var(--ink); letter-spacing:.2px;
       font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Arial Rounded MT Bold",system-ui,-apple-system,sans-serif;
       display:flex; flex-direction:column; min-height:100dvh;
       padding-top:env(safe-area-inset-top);
       padding-bottom:calc(86px + env(safe-area-inset-bottom));}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; letter-spacing:.2px;}
  .wrap{flex:1; width:100%; max-width:680px; margin:0 auto; padding:10px 16px 24px; display:flex; flex-direction:column;}

  header{display:flex; align-items:center; justify-content:center; padding:6px 0 12px;}
  header h1{font-size:22px; font-weight:900;}
  header h1 .hl{color:var(--violet);}

  /* ---------- review banner ---------- */
  #reviewBanner{display:block; width:100%; margin:0 0 14px; padding:15px 18px; border-radius:20px; text-align:left;
    background:linear-gradient(160deg,#0ea5e9,#38bdf8); color:#fff; font-weight:900; font-size:15px;
    box-shadow:0 10px 24px rgba(14,165,233,.35); animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

  /* ---------- islands ---------- */
  .island{background:var(--panel); border:1.5px solid var(--line); border-radius:26px;
    padding:18px 16px 16px; margin-bottom:16px; position:relative; overflow:hidden;}
  .island::before{content:attr(data-emoji); position:absolute; right:-12px; top:-18px;
    font-size:110px; opacity:.07; transform:rotate(12deg); pointer-events:none;}
  .island[data-isl="sprout"]  {--ia:#16a34a; --ib:#e9f7ec;}
  .island[data-isl="bridge"]  {--ia:#0ea5e9; --ib:#e6f4fc;}
  .island[data-isl="cascade"] {--ia:#0d9488; --ib:#e2f5f3;}
  .island[data-isl="ember"]   {--ia:#ea580c; --ib:#fdeee3;}
  .island[data-isl="storm"]   {--ia:#64748b; --ib:#eceff4;}
  .island[data-isl="aurora"]  {--ia:#7c4dff; --ib:#efe9ff;}
  .isl-name{font-size:19px; font-weight:900; display:flex; align-items:center; gap:9px; color:var(--ia);}
  .isl-progress{margin-left:auto; font-size:12px; font-weight:900; background:var(--ib); color:var(--ia);
    border-radius:999px; padding:5px 12px;}
  .unit-name{margin:16px 2px 4px; font-size:12px; font-weight:900; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted);}

  /* ---------- snaking trail ---------- */
  .trail{position:relative; display:flex; flex-direction:column; align-items:center; padding:6px 0 2px;}
  .trail::before{content:""; position:absolute; top:14px; bottom:14px; left:50%;
    border-left:4px dotted var(--ia); opacity:.3; transform:translateX(-2px);}
  .node{position:relative; z-index:1; width:170px; margin:7px 0; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .node.l{transform:translateX(-58px);} .node.r{transform:translateX(58px);}
  .node-face{width:62px; height:62px; border-radius:50%; display:grid; place-items:center; font-size:27px;
    background:var(--panel); border:3px dashed var(--line); box-shadow:0 4px 12px rgba(46,36,86,.10);
    transition:transform .15s;}
  .node:active .node-face{transform:scale(.93);}
  .node-name{font-size:12px; font-weight:800; color:var(--muted); text-align:center; line-height:1.25;}
  .node-badge{font-size:11px; min-height:14px; letter-spacing:1px;}
  .node.m0 .node-face{border-style:dashed; border-color:var(--ia);}
  .node.m1 .node-face{border-style:solid; border-color:var(--ia);}
  .node.m2 .node-face{border-style:solid; border-color:var(--ia); background:var(--ia); }
  .node.m2 .node-name{color:var(--ia);}
  .node.m3 .node-face{border-style:solid; border-color:var(--gold); background:linear-gradient(160deg,#f59e0b,#fbbf24);}
  .node.m3 .node-name{color:#b45309;}
  .node.locked .node-face{border-color:var(--line); background:#f1eef8; opacity:.7; font-size:20px;}
  .node.locked .node-name{opacity:.6;}
  .node .here{position:absolute; top:-26px; font-size:22px; animation:bounce 1.2s ease-in-out infinite; z-index:2;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .node.frontier .node-face{animation:ringPulse 1.8s ease-in-out infinite;}
  @keyframes ringPulse{0%,100%{box-shadow:0 4px 12px rgba(46,36,86,.10), 0 0 0 0 rgba(124,77,255,.0);}
    50%{box-shadow:0 4px 12px rgba(46,36,86,.10), 0 0 0 9px rgba(124,77,255,.18);}}

  /* ---------- boss character card ---------- */
  .boss-node{width:100%; margin-top:16px; display:flex; align-items:center; gap:14px; text-align:left;
    background:var(--ib); border:2px solid transparent; border-radius:20px; padding:14px;}
  .boss-node .boss-face{font-size:46px; filter:drop-shadow(0 3px 6px rgba(46,36,86,.18));}
  .boss-node b{font-size:15.5px; color:var(--ia);}
  .boss-node small{display:block; margin-top:5px; background:var(--panel); border-radius:12px 12px 12px 3px;
    padding:8px 11px; color:var(--ink); font-size:12.5px; line-height:1.45; box-shadow:0 2px 6px rgba(46,36,86,.08);}
  .boss-node.ready{border-color:var(--ia); animation:bob 2.2s ease-in-out infinite;}
  .boss-node.beaten{background:linear-gradient(160deg,#fde9bd,#fbd57e); border-color:var(--gold);}
  .boss-node.beaten b{color:#92400e;}
  .boss-node.waiting{filter:grayscale(.7); opacity:.75;}

  /* ---------- map dock: level, XP bar, continue ---------- */
  #mapDock{position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px); border-top:1.5px solid var(--line);
    padding:10px 16px calc(12px + env(safe-area-inset-bottom));}
  .dock-inner{max-width:680px; margin:0 auto; display:flex; align-items:center; gap:12px;}
  #continueBtn{flex:1; background:linear-gradient(160deg,#7c4dff,#9a6bff); color:#fff; font-weight:900;
    font-size:15px; padding:15px 18px; border-radius:999px; box-shadow:0 8px 18px rgba(124,77,255,.4);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #continueBtn:active{transform:scale(.97);}

  /* HUD: level inside an XP ring, fixed top-right, above everything */
  #hud{position:fixed; top:calc(8px + env(safe-area-inset-top)); right:12px; z-index:45;
    width:54px; height:54px; border-radius:50%; padding:5px;
    background:conic-gradient(var(--violet) 0%, #ece7f7 0% 100%);
    box-shadow:0 6px 16px rgba(46,36,86,.22); transition:transform .15s;}
  #hud:active{transform:scale(.92);}
  #hudLv{display:grid; place-items:center; width:100%; height:100%; border-radius:50%;
    background:var(--panel); font-weight:900; font-size:17px; color:var(--violet);}
  header{padding-right:62px;}
  .play-bar{padding-right:62px;}

  .island.conquered{border-color:var(--gold); box-shadow:0 0 0 3px rgba(251,191,36,.25);}

  .pgroup{border:1.5px solid var(--line); border-radius:16px; margin-top:12px; overflow:hidden;}
  .pgroup-head{width:100%; text-align:left; padding:13px 15px; font-weight:900; font-size:14.5px; background:var(--bg);}
  .pgroup-head .caret{float:right; color:var(--muted);}
  .pgroup-body{padding:4px 14px 14px;}
  .active-tag{font-size:10.5px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:var(--mint);
    background:#e7f9f0; border-radius:999px; padding:5px 10px; flex:none;}
  .mini-btn{flex:none; font-size:12px; font-weight:900; color:var(--violet); background:#efe9ff;
    border-radius:999px; padding:8px 13px;}
  .mini-btn.del{color:var(--coral); background:#fdeef1;}
  .mini-btn.del.armed{background:var(--coral); color:#fff;}
  .who-card{width:100%; margin-top:10px; display:flex; align-items:center; gap:12px; text-align:left;
    background:var(--bg); border:2px solid var(--line); border-radius:18px; padding:13px 15px;}
  .who-card b{font-size:16px;}
  .who-card small{display:block; color:var(--muted); font-weight:700; margin-top:2px;}
  .who-face{font-size:34px;}
  .who-card.here{border-color:var(--violet); background:#efe9ff;}

  /* parents' corner entry: fixed top-left, hold to open */
  #parentsBtn{position:fixed; top:calc(11px + env(safe-area-inset-top)); left:12px; z-index:45;
    width:46px; height:46px; border-radius:50%; font-size:19px; display:grid; place-items:center;
    background:var(--panel); border:1.5px solid var(--line); box-shadow:0 6px 16px rgba(46,36,86,.15);
    touch-action:none; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  #parentsBtn.holding{background:#efe9ff; border-color:var(--violet); animation:holdPulse 1s linear infinite;}
  @keyframes holdPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,77,255,.0);}50%{box-shadow:0 0 0 8px rgba(124,77,255,.2);}}
  body.in-play #parentsBtn{display:none;}
  #islRail{position:fixed; left:6px; top:50%; transform:translateY(-50%); z-index:31;
    display:flex; flex-direction:column; gap:7px;}
  .rail-dot{width:36px; height:36px; border-radius:50%; font-size:16px; display:grid; place-items:center;
    background:var(--panel); border:1.5px solid var(--line); box-shadow:0 4px 10px rgba(46,36,86,.12);
    opacity:.82; transition:transform .15s;}
  .rail-dot:active{transform:scale(.9);}
  .rail-dot.here{border-color:var(--violet); opacity:1; box-shadow:0 0 0 4px rgba(124,77,255,.18);}
  body.in-play #islRail{display:none;}
  @media (max-width:430px){ #islRail{left:3px;} .rail-dot{width:31px; height:31px; font-size:14px;} }

  #testChip{position:fixed; top:calc(64px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:46;
    background:linear-gradient(160deg,#f59e0b,#fbbf24); color:#5b3104; font-weight:900; font-size:12px;
    padding:9px 16px; border-radius:999px; box-shadow:0 8px 20px rgba(245,158,11,.45); white-space:nowrap;}
  header{padding-left:62px;}

  /* right-side control stack, tucked under the rewards (backpack) ring */
  #sideStack{position:fixed; top:calc(70px + env(safe-area-inset-top)); right:14px; z-index:44;
    display:flex; flex-direction:column; align-items:flex-end; gap:10px;}
  body.in-play #sideStack{display:none;}

  /* daily campfire: small animated fire */
  #campfire{position:relative; width:46px; height:46px; display:grid; place-items:center; background:none; border:none; padding:0;}
  #campfire .flame{font-size:30px; line-height:1; display:block; transform-origin:50% 90%;}
  #campfire .streak{position:absolute; bottom:-3px; right:-3px; min-width:17px; height:17px; padding:0 3px;
    border-radius:999px; background:var(--sun); color:#fff; font-size:10px; font-weight:900;
    display:none; align-items:center; justify-content:center; border:2px solid var(--bg);}
  #campfire.has-streak .streak{display:flex;}
  /* pending: dull ember, with an occasional wiggle to draw the eye */
  #campfire.pending .flame{filter:grayscale(.8) brightness(1.1) opacity(.5); animation:emberPoke 5s ease-in-out infinite;}
  @keyframes emberPoke{0%,84%,100%{transform:scale(1) rotate(0);}88%{transform:scale(1.2) rotate(-7deg);}
    92%{transform:scale(1.12) rotate(7deg);}96%{transform:scale(1.06) rotate(-3deg);}}
  /* lit: warm, lively flicker + soft glow */
  #campfire.lit .flame{filter:drop-shadow(0 0 6px rgba(245,158,11,.75)); animation:flameFlicker 1.1s ease-in-out infinite;}
  @keyframes flameFlicker{0%,100%{transform:scale(1,1) translateY(0);}
    25%{transform:scale(1.08,.95) translateY(-1px);}50%{transform:scale(.94,1.08) translateY(-2px);}
    75%{transform:scale(1.05,.98) translateY(-1px);}}

  /* lightning round: round animated bolt (like the fire) with a tiny score beside it */
  #lightningBtn{display:flex; align-items:center; gap:4px; background:none; border:none; padding:0; height:46px;}
  #lightningBtn .bolt{font-size:30px; line-height:1; display:block; transform-origin:50% 50%;
    filter:drop-shadow(0 0 5px rgba(124,77,255,.55)); animation:boltZap 2.6s ease-in-out infinite;}
  #lightningBtn .best{font-size:11px; font-weight:900; color:var(--violet); opacity:.85; line-height:1;}
  #lightningBtn:active .bolt{transform:scale(.9);}
  @keyframes boltZap{
    0%,84%,100%{transform:scale(1) rotate(0); filter:drop-shadow(0 0 5px rgba(124,77,255,.45));}
    87%{transform:scale(1.28) rotate(-11deg); filter:drop-shadow(0 0 11px rgba(124,77,255,.95));}
    90%{transform:scale(1.12) rotate(10deg); filter:drop-shadow(0 0 4px rgba(124,77,255,.6));}
    93%{transform:scale(1.2) rotate(-6deg); filter:drop-shadow(0 0 9px rgba(124,77,255,.9));}
    96%{transform:scale(1.06) rotate(3deg);}}

  /* music toggle */
  #musicBtn{width:44px; height:44px; border-radius:50%; background:var(--panel); border:1.5px solid var(--line);
    font-size:19px; display:grid; place-items:center; box-shadow:0 6px 16px rgba(46,36,86,.15);}
  #musicBtn:active{transform:scale(.92);}
  #musicBtn.off{opacity:.6;}

  /* full-screen lightning strike on tap (kept to 2 gentle flashes; off for reduced motion) */
  .bolt-flash{position:fixed; inset:0; z-index:70; pointer-events:none; overflow:hidden;}
  .bolt-flash .sheet{position:absolute; inset:0; background:radial-gradient(circle at 50% 30%,#fff,#e7deff 70%);
    opacity:0; animation:boltSheet .75s ease-out forwards;}
  @keyframes boltSheet{0%{opacity:0;}10%{opacity:.9;}22%{opacity:.15;}34%{opacity:.75;}55%{opacity:0;}100%{opacity:0;}}
  .bolt-flash svg{position:absolute; top:-3%; left:50%; transform:translateX(-50%); height:106%; width:auto;
    filter:drop-shadow(0 0 14px rgba(124,77,255,.95)); animation:boltStrike .75s ease-out forwards;}
  @keyframes boltStrike{0%{opacity:0;}9%{opacity:1;}30%{opacity:.85;}48%{opacity:.15;}62%{opacity:.95;}100%{opacity:0;}}

  /* backpack */
  .bp-title{margin-top:16px; font-size:12px; font-weight:900; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); text-align:left;}
  .crowns{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .crown{flex:1; min-width:48px; background:var(--bg); border:1.5px solid var(--line); border-radius:14px;
    padding:8px 4px; font-size:22px; display:flex; flex-direction:column; align-items:center; gap:2px; opacity:.55;}
  .crown small{font-size:8.5px; font-weight:800; color:var(--muted);}
  .crown.won{opacity:1; background:linear-gradient(160deg,#fde9bd,#fbd57e); border-color:var(--gold);}
  .badges{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .badge{width:74px; background:var(--bg); border:1.5px solid var(--line); border-radius:14px;
    padding:8px 4px; font-size:21px; display:flex; flex-direction:column; align-items:center; gap:3px; opacity:.45;}
  .badge small{font-size:8.5px; font-weight:800; color:var(--muted); text-align:center; line-height:1.2;}
  .badge.won{opacity:1; background:#efe9ff; border-color:var(--violet2);}
  .result-lv{margin-top:12px; font-size:22px; font-weight:900; color:var(--violet); animation:popUp .35s cubic-bezier(.34,1.56,.64,1);}
  .result-badge{margin-top:8px; font-size:14px; font-weight:700; color:#b45309; background:#fff3da;
    border:1.5px solid #f5c96b; border-radius:12px; padding:8px 12px;}

  /* parents' corner */
  .parents{max-width:560px; text-align:left;}
  .parents h2{text-align:center;}
  .p-section{margin-top:16px; font-size:12px; font-weight:900; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted);}
  .child-row{display:flex; align-items:center; gap:10px; margin-top:8px;}
  .child-row .face-btn{width:52px; height:52px; border-radius:16px; background:var(--bg); border:1.5px solid var(--line); font-size:26px; flex:none;}
  .child-row input{flex:1; min-width:0; padding:12px 14px; border-radius:13px; border:1.5px solid var(--line);
    background:var(--bg); color:var(--ink); font:inherit; font-weight:800; outline:none;}
  .child-row input:focus{border-color:var(--violet);}
  .child-year-row{display:flex; margin:4px 0 2px 62px;}
  .year-pick-btn{font-size:12px; font-weight:800; color:var(--muted); background:var(--bg);
    border:1.5px solid var(--line); border-radius:11px; padding:7px 12px; cursor:pointer; text-align:left;}
  .year-pick-btn:active{transform:scale(.98);}
  .year-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .year-card{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:12px 14px; border-radius:16px; border:1.5px solid var(--line); background:var(--panel); cursor:pointer;}
  .year-card:active{transform:scale(.99);}
  .year-card.on{border-color:var(--violet); background:#efe9ff;}
  .year-card .year-emoji{font-size:24px; flex:none;}
  .year-card .year-name{font-weight:900; font-size:16px; flex:1;}
  .year-card .year-tag{font-size:11px; font-weight:900; border-radius:999px; padding:4px 10px;}
  .year-card .year-tag.rdy{background:#e7f8ef; color:#0c8a52;}
  .year-card .year-tag.soon{background:#fff3e0; color:#b26a00;}
  .stat-line{margin-top:8px; font-size:13.5px; color:var(--muted); line-height:1.6;}
  .matrix-isl{margin-top:8px;}
  .matrix-isl small{font-weight:900; font-size:10.5px; color:var(--muted);}
  .matrix{display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;}
  .sq{width:16px; height:16px; border-radius:5px; background:var(--panel); border:1.5px solid var(--line);}
  .sq.locked{background:#f1eef8; border-color:#eae5f5;}
  .sq.m1{border-color:var(--violet);}
  .sq.m2{background:var(--violet); border-color:var(--violet);}
  .sq.m3{background:linear-gradient(160deg,#f59e0b,#fbbf24); border-color:var(--gold);}
  .legend{margin-top:6px; font-size:10.5px; color:var(--muted);}
  .weak-row{margin-top:7px; background:var(--bg); border:1.5px solid var(--line); border-radius:13px;
    padding:10px 13px; font-size:13.5px; font-weight:700;}
  .weak-row small{display:block; color:var(--muted); font-weight:700; margin-top:2px;}
  .tgl-row{display:flex; gap:8px; margin-top:8px;}
  .tgl{flex:1; padding:12px; border-radius:13px; background:var(--bg); border:1.5px solid var(--line);
    font-weight:800; font-size:13.5px; color:var(--muted);}
  .tgl.on{background:#efe9ff; border-color:var(--violet); color:var(--violet);}
  .danger-btn{width:100%; margin-top:9px; padding:13px; border-radius:14px; font-weight:800; font-size:14px;
    background:transparent; border:1.5px solid #f3b8c4; color:var(--coral);}

  /* the cloud chip lives in the Parents' Corner now */
  #cloudChip{display:none !important;}

  /* ---------- play mode: full-screen, answers in a fixed dock ---------- */
  #scrPlay{position:fixed; inset:0; z-index:35; background:var(--bg); display:flex; flex-direction:column;
    justify-content:center; padding:calc(10px + env(safe-area-inset-top)) 16px 0;}
  .play-inner{width:100%; max-width:680px; max-height:780px; margin:0 auto; flex:1; display:flex; flex-direction:column; min-height:0;}
  .play-bar{display:flex; align-items:center; gap:10px; padding:2px 0 8px;}
  #exitBtn{width:48px; height:48px; border-radius:15px; background:var(--panel); border:1.5px solid var(--line); font-size:18px;}
  #playTitle{font-weight:900; font-size:16px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #pips{display:flex; gap:4px; font-size:15px;}
  #pips .pip{opacity:.85;}
  #pips .pip.now{animation:bounce 1.1s ease-in-out infinite;}
  #pips .pip.miss{opacity:.45;}

  .prompt-zone{flex:1; display:flex; flex-direction:column; justify-content:center; min-height:0; padding:6px 0;}
  #promptCard{position:relative; background:var(--panel); border:1.5px solid var(--line); border-radius:26px;
    padding:26px 20px; text-align:center; cursor:pointer; box-shadow:0 10px 30px rgba(46,36,86,.08);}
  .q-prompt{font-size:clamp(20px,5.6vw,28px); font-weight:900; line-height:1.35;}
  .q-visual{margin-top:14px; font-size:clamp(26px,7.5vw,40px); line-height:1.5; word-spacing:4px;}
  .q-pic{margin-top:14px; display:flex; justify-content:center;}
  .q-pic svg{width:auto; max-width:88%;}
  .say-btn{display:block; margin:16px auto 0; width:max-content; min-height:40px; padding:9px 18px;
    border-radius:999px; background:var(--bg); border:1.5px solid var(--line); font-size:14px; font-weight:900;
    color:var(--muted); line-height:1;}
  .say-btn:active{transform:scale(.96);}
  .coach{margin-top:10px; background:#fff7e2; border:2px solid #f5d98b; border-radius:18px;
    padding:13px 15px; animation:popUp .25s ease;}
  .coach-head{font-weight:900; font-size:14.5px; color:#8a5a06; margin-bottom:4px;}
  .coach .teach-steps .step{background:#fff; border-color:#f5d98b;}
  .coach-next{width:100%; min-height:64px; border-radius:18px; font-weight:900; font-size:17px;
    background:linear-gradient(160deg,#f59e0b,#fbbf24); color:#5b3104; box-shadow:0 5px 0 #c47d08;}
  .coach-next:active{transform:translateY(3px); box-shadow:none;}
  .prompt-zone{overflow:auto;}
  .hintbar{margin-top:10px; background:#fff7e2; border:1.5px solid #f5d98b; color:#8a5a06;
    border-radius:16px; padding:12px 15px; font-size:14px; line-height:1.5; font-weight:700;
    animation:popUp .25s ease;}

  .play-dock{background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-top:1.5px solid var(--line);
    margin:0 -16px; border-radius:22px 22px 0 0;
    padding:14px 16px calc(30px + env(safe-area-inset-bottom));}
  .play-dock-inner{max-width:680px; margin:0 auto;}

  .choice-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:11px;}
  .choice-btn{position:relative; min-height:68px; border-radius:22px; border:2.5px solid;
    font-size:clamp(19px,5.4vw,28px); font-weight:900; padding:10px; transition:transform .12s;
    animation:btnFloat 2.6s ease-in-out infinite;}
  .choice-grid .choice-btn:nth-child(4n+1){background:linear-gradient(160deg,#e7f9f0,#d2f3e3); border-color:#7fd9b3; box-shadow:0 5px 0 #7fd9b3; animation-delay:0s;}
  .choice-grid .choice-btn:nth-child(4n+2){background:linear-gradient(160deg,#e6f4fc,#d0eafb); border-color:#86c8ef; box-shadow:0 5px 0 #86c8ef; animation-delay:.35s;}
  .choice-grid .choice-btn:nth-child(4n+3){background:linear-gradient(160deg,#fdeee3,#fbdfca); border-color:#f3b285; box-shadow:0 5px 0 #f3b285; animation-delay:.7s;}
  .choice-grid .choice-btn:nth-child(4n+4){background:linear-gradient(160deg,#efe9ff,#e1d5ff); border-color:#b79aff; box-shadow:0 5px 0 #b79aff; animation-delay:1.05s;}
  @keyframes btnFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .choice-btn:active{transform:translateY(3px) scale(.97); box-shadow:none; animation:none;}
  .choice-btn.hit{animation:hitPop .45s ease !important;}
  .choice-btn.hit::after{content:"✨"; position:absolute; top:-12px; right:-4px; font-size:22px; animation:popUp .4s ease;}
  .choice-btn.shake{animation:shakeNo .35s linear !important;}
  .tap-tile{animation:btnFloat 2.8s ease-in-out infinite;}
  .tap-grid .tap-tile:nth-child(odd){animation-delay:.4s;}
  .tf-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .tf-grid .choice-btn.true{border-color:#bbe7d4;} .tf-grid .choice-btn.false{border-color:#f7cdd6;}

  /* button-level feedback */
  .hit{background:#e7f9f0 !important; border-color:var(--mint) !important; animation:hitPop .4s ease;}
  @keyframes hitPop{0%{transform:scale(1);}40%{transform:scale(1.08);}100%{transform:scale(1);}}
  .shake{background:#fdeef1 !important; border-color:var(--coral) !important; animation:shakeNo .35s linear;}
  @keyframes shakeNo{0%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-4px);}100%{transform:translateX(0);}}
  .reveal{border-color:var(--mint) !important; box-shadow:0 0 0 4px rgba(16,185,129,.25) !important;}

  .pad-display{height:58px; border-radius:16px; background:var(--bg); border:1.5px solid var(--line);
    display:grid; place-items:center; font-size:30px; font-weight:900; margin-bottom:10px; letter-spacing:3px;}
  .pad-display.hit{background:#e7f9f0; border-color:var(--mint);}
  .pad-display.shake{background:#fdeef1; border-color:var(--coral);}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .key{height:54px; border-radius:15px; background:var(--panel); border:1.5px solid var(--line);
    font-size:21px; font-weight:900; box-shadow:0 2px 0 var(--line);}
  .key:active{transform:translateY(2px); box-shadow:none;}
  .key.ok{background:linear-gradient(160deg,#0e9f6e,#34d399); color:#fff; border:none; box-shadow:0 3px 0 #0b7a55;}
  .key.back{color:var(--muted);}

  .order-slots{display:flex; gap:8px; justify-content:center; margin-bottom:12px;}
  .slot{width:54px; height:54px; border-radius:14px; border:2.5px dashed var(--line); display:grid; place-items:center;
    font-size:20px; font-weight:900; color:var(--muted); background:var(--bg);}
  .slot.filled{border-style:solid; border-color:var(--violet); color:var(--ink); background:#efe9ff;}
  .order-chips{display:flex; gap:9px; justify-content:center; flex-wrap:wrap;}
  .chip{width:58px; height:58px; border-radius:16px; background:var(--panel); border:2.5px solid var(--line);
    font-size:21px; font-weight:900; box-shadow:0 3px 0 var(--line);}
  .chip:active{transform:translateY(2px); box-shadow:none;}
  .chip.used{opacity:.25;}

  .tap-grid{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .tap-tile{width:72px; height:72px; border-radius:18px; background:var(--panel); border:2.5px solid var(--line);
    font-size:30px; box-shadow:0 3px 0 var(--line);}
  .tap-tile:active{transform:translateY(2px); box-shadow:none;}
  .line-grid{display:flex; gap:4px; justify-content:center; align-items:flex-end;
    border-bottom:4px solid var(--line); padding-bottom:0;}
  .line-tick{min-width:48px; height:54px; border-radius:12px 12px 0 0; background:var(--panel);
    border:1.5px solid var(--line); border-bottom:none; font-size:17px; font-weight:900;}

  .xp-pop{position:fixed; top:calc(70px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:56;
    background:var(--panel); border:2px solid var(--gold); border-radius:999px; padding:9px 18px;
    font-weight:900; font-size:15px; color:#b45309; box-shadow:0 8px 22px rgba(46,36,86,.18);
    animation:popUp .25s cubic-bezier(.34,1.56,.64,1);}

  /* ---------- modals ---------- */
  .modal-back{position:fixed; inset:0; background:rgba(46,36,86,.45); backdrop-filter:blur(5px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:18px;
    overscroll-behavior:contain;}
  .modal{background:var(--panel); border:1.5px solid var(--line); border-radius:26px; padding:24px 22px;
    width:100%; max-width:390px; text-align:center; animation:popUp .3s cubic-bezier(.34,1.56,.64,1);
    max-height:86dvh; overflow:auto; overscroll-behavior:contain; box-shadow:0 24px 60px rgba(46,36,86,.25);}
  @keyframes popUp{from{transform:translateY(26px) scale(.96); opacity:0;} to{transform:none; opacity:1;}}
  .sheet-icon{font-size:46px;}
  .modal h2{font-size:21px; font-weight:900; margin-top:4px;}
  .sheet-state{display:inline-block; margin-top:8px; padding:5px 14px; border-radius:999px; font-weight:900; font-size:12.5px;
    background:var(--bg); color:var(--muted); border:1.5px solid var(--line);}
  .sheet-state.m1{color:var(--violet); border-color:var(--violet);}
  .sheet-state.m2{color:#fff; background:var(--violet); border-color:var(--violet);}
  .sheet-state.m3{color:#7c3e02; background:linear-gradient(160deg,#fbbf24,#fde68a); border-color:var(--gold);}
  .sheet-acc{color:var(--muted); font-size:13.5px; margin-top:8px; line-height:1.55;}
  .primary-btn{width:100%; margin-top:16px; padding:15px; border-radius:16px; font-weight:900; font-size:15.5px;
    background:linear-gradient(160deg,#7c4dff,#9a6bff); color:#fff; box-shadow:0 6px 16px rgba(124,77,255,.35);}
  .gold-btn{width:100%; margin-top:9px; padding:15px; border-radius:16px; font-weight:900; font-size:15.5px;
    background:linear-gradient(160deg,#f59e0b,#fbbf24); color:#5b3104; box-shadow:0 6px 16px rgba(245,158,11,.35);}
  .soft-btn{width:100%; margin-top:9px; padding:14px; border-radius:16px; font-weight:800; font-size:14.5px;
    background:var(--bg); border:1.5px solid var(--line); color:var(--muted);}
  .teach{text-align:left;}
  .teach h2,.teach .sheet-icon{text-align:center; display:block;}
  .teach-steps .step{background:#efe9ff; border:1.5px solid #ddd0fb; border-radius:15px; padding:12px 14px;
    margin-top:9px; font-size:15px; line-height:1.55; animation:popUp .25s ease;}

  /* learn-it-first concept screen (shown the first time a skill is met) */
  .learn-eg{background:var(--bg); border:1.5px solid var(--line); border-radius:18px; padding:14px 14px 12px;
    margin-top:10px; text-align:center;}
  .learn-eg .eg-prompt{font-weight:900; font-size:16px; line-height:1.35;}
  .learn-eg .q-pic{margin-top:8px; display:flex; justify-content:center;}
  .learn-eg .eg-visual{margin-top:8px; font-size:26px; line-height:1.4; word-spacing:4px;}
  .learn-eg .eg-ans{margin-top:10px; font-weight:900; font-size:15px; color:var(--mint);}

  /* keyboard focus ring — high-contrast, completes keyboard play */
  :focus-visible{outline:3px solid var(--ink); outline-offset:2px;}
  .choice-btn:focus-visible,.tap-tile:focus-visible,.line-tick:focus-visible,.chip:focus-visible,
  .key:focus-visible,.node:focus-visible{outline:3px solid var(--ink); outline-offset:3px;}

  .result-head{font-size:32px; font-weight:900; letter-spacing:2px;}
  .result-xp{margin-top:10px; font-size:17px; font-weight:900; color:var(--sun);}
  .result-best{margin-top:10px; display:inline-block; padding:8px 16px; border-radius:999px; font-size:15px; font-weight:900;
    color:#7c3e02; background:linear-gradient(160deg,#fbbf24,#fde68a); border:1.5px solid var(--gold);}

  .help-fab{position:fixed; right:14px; bottom:calc(88px + env(safe-area-inset-bottom)); z-index:31;
    width:44px; height:44px; border-radius:50%; background:var(--panel); border:1.5px solid var(--line);
    color:var(--muted); font-weight:900; font-size:18px; box-shadow:0 6px 16px rgba(46,36,86,.15);}
  .help-modal{text-align:left;}
  .help-modal h2{text-align:center;}
  .help-list{margin:10px 0 0; padding-left:6px; color:var(--muted); font-size:14px; line-height:1.75; list-style:none;}
  .help-list li{margin:7px 0;}

  .confetti{position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden;}
  .confetti span{position:absolute; top:-14px; width:8px; height:13px; border-radius:2px; animation:confFall 3s linear forwards;}
  @keyframes confFall{to{transform:translateY(112vh) rotate(540deg);}}

  .footer{text-align:center; color:var(--muted); font-size:11.5px; line-height:1.7; padding:18px 0 6px;}
  .footer a{color:var(--muted);}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001s !important; transition-duration:.001s !important;}
  }
</style>
</head>
